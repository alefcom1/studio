<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="Плохая и хорошая мобильная версия: мелкий текст и тесные кнопки против удобного экрана">
  <defs>
    <pattern id="gridMobS" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="600" fill="#F7F6F2"/>
  <rect width="1200" height="600" fill="url(#gridMobS)"/>
  <line x1="80" y1="86" x2="1120" y2="86" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="72" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">ПОЧЕМУ УХОДЯТ — И ПОЧЕМУ ОСТАЮТСЯ</text>
  <g transform="translate(80,120)">
    <rect width="470" height="380" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="44" class="mono" font-size="13" letter-spacing="2" fill="#5A5E66">УХОДЯТ</text>
    <text x="24" y="96" class="body" font-size="19" fill="#14161A">— мелкий текст, нужно увеличивать</text>
    <text x="24" y="140" class="body" font-size="19" fill="#14161A">— тесные кнопки, промахивается палец</text>
    <text x="24" y="184" class="body" font-size="19" fill="#14161A">— медленная загрузка на связи похуже</text>
    <text x="24" y="228" class="body" font-size="19" fill="#14161A">— форма-анкета из семи полей</text>
    <text x="24" y="272" class="body" font-size="19" fill="#14161A">— всплывающее окно на весь экран</text>
    <text x="24" y="316" class="body" font-size="19" fill="#14161A">— горизонтальная прокрутка</text>
  </g>
  <g transform="translate(650,120)">
    <rect width="470" height="380" fill="#2440C8"/>
    <text x="24" y="44" class="mono" font-size="13" letter-spacing="2" fill="#C9D2FF">ОСТАЮТСЯ</text>
    <text x="24" y="96" class="body" font-size="19" fill="#FFFFFF">— крупный, читаемый шрифт</text>
    <text x="24" y="140" class="body" font-size="19" fill="#FFFFFF">— большие кнопки в один палец</text>
    <text x="24" y="184" class="body" font-size="19" fill="#FFFFFF">— быстрая загрузка на любой связи</text>
    <text x="24" y="228" class="body" font-size="19" fill="#FFFFFF">— короткая форма из пары полей</text>
    <text x="24" y="272" class="body" font-size="19" fill="#FFFFFF">— закрывающийся баннер</text>
    <text x="24" y="316" class="body" font-size="19" fill="#FFFFFF">— всё помещается в ширину экрана</text>
  </g>
  <text x="80" y="560" class="mono" font-size="15" fill="#5A5E66">Проектируем от узкого экрана (390px) и держим в договоре PageSpeed 90+.</text>
</svg>
