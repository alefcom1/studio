<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Cosa include un sito aziendale fatto bene: le sei aree della checklist">
  <defs>
    <pattern id="gridScil" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="520" fill="#F7F6F2"/>
  <rect width="1200" height="520" fill="url(#gridScil)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">COSA INCLUDE UN SITO AZIENDALE — SEI AREE</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <g class="body" font-size="18">
    <g transform="translate(80,100)">
      <rect x="0" y="0" width="34" height="34" fill="#2440C8"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">1</text>
      <text x="52" y="24" fill="#14161A">Fondamenta tecniche — hosting solido, HTTPS, velocità</text>
    </g>
    <g transform="translate(80,144)">
      <rect x="0" y="0" width="34" height="34" fill="#2440C8"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">2</text>
      <text x="52" y="24" fill="#14161A">Contenuti che convertono — testi chiari, prezzi, CTA</text>
    </g>
    <g transform="translate(80,188)">
      <rect x="0" y="0" width="34" height="34" fill="#5B73E8"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">3</text>
      <text x="52" y="24" fill="#14161A">Legale in regola — privacy, cookie, accessibilità</text>
    </g>
    <g transform="translate(80,232)">
      <rect x="0" y="0" width="34" height="34" fill="#5B73E8"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">4</text>
      <text x="52" y="24" fill="#14161A">Visibilità — SEO tecnica di base, già dal lancio</text>
    </g>
    <g transform="translate(80,276)">
      <rect x="0" y="0" width="34" height="34" fill="#14161A"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">5</text>
      <text x="52" y="24" fill="#14161A">Misura — un analytics che funziona, rispettando i dati</text>
    </g>
    <g transform="translate(80,320)">
      <rect x="0" y="0" width="34" height="34" fill="#14161A"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">6</text>
      <text x="52" y="24" fill="#14161A">Manutenzione — aggiornamenti e backup nel tempo</text>
    </g>
  </g>
  <g transform="translate(80,378)">
    <rect x="0" y="0" width="1040" height="52" fill="#EEF1FE" stroke="#2440C8" stroke-width="1"/>
    <text x="20" y="32" class="mono" font-size="15" fill="#2440C8">Mancano quasi sempre 3, 5 e 6 — le tre meno visibili al primo sguardo.</text>
  </g>
</svg>
