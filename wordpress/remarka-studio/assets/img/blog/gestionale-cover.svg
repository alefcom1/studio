<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Gestionale su misura contro Excel">
  <defs>
    <pattern id="gridGc" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}</style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridGc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">QUANDO CONVIENE IL SALTO</text>
  <text x="80" y="238" class="disp" font-size="92" letter-spacing="1" fill="#14161A">EXCEL → GESTIONALE</text>
  <text x="84" y="298" class="body" font-size="34" font-weight="600" fill="#14161A">il foglio regge, finché non vi frena</text>
  <text x="84" y="342" class="mono" font-size="20" fill="#5A5E66">ordini persi tra fogli ed email · errori che nessuno vede</text>
  <!-- comparison -->
  <g transform="translate(80,392)">
    <rect x="0" y="0" width="480" height="176" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="22" y="40" class="mono" font-size="14" fill="#5A5E66">EXCEL / EMAIL</text>
    <g class="mono" font-size="15" fill="#14161A"><text x="22" y="80">▸ versioni sparse</text><text x="22" y="112">▸ dati ricopiati a mano</text><text x="22" y="144">▸ nessun ruolo, nessuna traccia</text></g>
  </g>
  <g transform="translate(600,392)">
    <rect x="0" y="0" width="520" height="176" fill="#14161A"/>
    <rect x="0" y="0" width="520" height="8" fill="#2440C8"/>
    <text x="22" y="44" class="mono" font-size="14" fill="#9AA0AA">GESTIONALE SU MISURA</text>
    <g class="mono" font-size="15" fill="#F7F6F2"><text x="22" y="84">▸ un solo sistema</text><text x="22" y="116">▸ stato di ogni pratica</text><text x="22" y="148">▸ ruoli e storico</text></g>
  </g>
</svg>
