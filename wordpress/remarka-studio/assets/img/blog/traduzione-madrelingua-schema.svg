<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Quando basta la traduzione automatica e quando serve un madrelingua">
  <defs>
    <pattern id="gridTrs" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}</style>
  </defs>
  <rect width="1200" height="520" fill="#F7F6F2"/>
  <rect width="1200" height="520" fill="url(#gridTrs)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">IL TESTO GIUSTO AL POSTO GIUSTO — NON «AI CONTRO UMANO»</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>

  <g transform="translate(80,110)">
    <rect x="0" y="0" width="490" height="330" fill="#FFFFFF" stroke="#5B73E8" stroke-width="1.5"/>
    <rect x="0" y="0" width="490" height="8" fill="#5B73E8"/>
    <text x="28" y="58" class="mono" font-size="14" letter-spacing="2" fill="#5B73E8">BASTA L'AUTOMATICA</text>
    <text x="28" y="98" class="body" font-size="27" fill="#14161A">Contenuti tecnici</text>
    <text x="28" y="128" class="body" font-size="27" fill="#14161A">e grandi volumi</text>
    <text x="28" y="184" class="mono" font-size="15" fill="#5A5E66">· schede molto standardizzate</text>
    <text x="28" y="214" class="mono" font-size="15" fill="#5A5E66">· documentazione e archivi</text>
    <text x="28" y="244" class="mono" font-size="15" fill="#5A5E66">· prime bozze da rifinire</text>
    <text x="28" y="296" class="mono" font-size="14" fill="#5B73E8">rende: uno strumento serio</text>
  </g>

  <g transform="translate(630,110)">
    <rect x="0" y="0" width="490" height="330" fill="#14161A"/>
    <rect x="0" y="0" width="490" height="8" fill="#2440C8"/>
    <text x="28" y="58" class="mono" font-size="14" letter-spacing="2" fill="#8FA0FF">SERVE UN MADRELINGUA</text>
    <text x="28" y="98" class="body" font-size="27" fill="#FFFFFF">Marketing, tono</text>
    <text x="28" y="128" class="body" font-size="27" fill="#FFFFFF">e cultura locale</text>
    <text x="28" y="184" class="mono" font-size="15" fill="#B7BEC9">· slogan e pagine che vendono</text>
    <text x="28" y="214" class="mono" font-size="15" fill="#B7BEC9">· tono di voce del brand</text>
    <text x="28" y="244" class="mono" font-size="15" fill="#B7BEC9">· riferimenti e modi di dire</text>
    <text x="28" y="296" class="mono" font-size="14" fill="#8FA0FF">conta: la differenza che si sente</text>
  </g>
</svg>
