<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Core Web Vitals nel 2026">
  <defs>
    <pattern id="gridVc" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridVc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">GOOGLE · MOBILE · 2026</text>
  <text x="80" y="252" class="disp" font-size="96" letter-spacing="1" fill="#14161A">Core Web Vitals</text>
  <text x="84" y="314" class="body" font-size="32" font-weight="600" fill="#14161A">cosa misura davvero Google</text>
  <text x="84" y="356" class="mono" font-size="20" fill="#5A5E66">LCP · INP · CLS — sul mobile, dati di campo</text>
  <!-- three metric tiles -->
  <g transform="translate(80,410)" text-anchor="middle">
    <g>
      <rect x="0" y="0" width="230" height="130" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
      <text x="115" y="58" class="disp" font-size="46" fill="#2440C8">LCP</text>
      <text x="115" y="96" class="mono" font-size="16" fill="#5A5E66">caricamento</text>
      <text x="115" y="120" class="mono" font-size="15" fill="#14161A">&lt; 2,5 s</text>
    </g>
    <g transform="translate(260,0)">
      <rect x="0" y="0" width="230" height="130" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
      <text x="115" y="58" class="disp" font-size="46" fill="#2440C8">INP</text>
      <text x="115" y="96" class="mono" font-size="16" fill="#5A5E66">reattività</text>
      <text x="115" y="120" class="mono" font-size="15" fill="#14161A">&lt; 200 ms</text>
    </g>
    <g transform="translate(520,0)">
      <rect x="0" y="0" width="230" height="130" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
      <text x="115" y="58" class="disp" font-size="46" fill="#2440C8">CLS</text>
      <text x="115" y="96" class="mono" font-size="16" fill="#5A5E66">stabilità</text>
      <text x="115" y="120" class="mono" font-size="15" fill="#14161A">&lt; 0,1</text>
    </g>
  </g>
  <!-- mobile vs desktop badge -->
  <g transform="translate(910,410)">
    <rect x="0" y="0" width="210" height="130" fill="#14161A"/>
    <text x="105" y="52" class="mono" font-size="14" fill="#9AA0AA" text-anchor="middle">CONTA / COUNTS</text>
    <text x="105" y="98" class="disp" font-size="40" fill="#FFFFFF" text-anchor="middle">mobile</text>
  </g>
</svg>
