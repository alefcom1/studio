<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Modello pillar-cluster: una pagina pilastro al centro collegata agli articoli satellite del tema">
  <defs>
    <pattern id="gridTas" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="500" fill="#F7F6F2"/>
  <rect width="1200" height="500" fill="url(#gridTas)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">MODELLO PILLAR-CLUSTER — L'AUTOREVOLEZZA TEMATICA</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <!-- connecting lines from pillar (center 600,280) to satellites -->
  <g stroke="#5B73E8" stroke-width="2">
    <line x1="600" y1="280" x2="270" y2="170"/>
    <line x1="600" y1="280" x2="270" y2="390"/>
    <line x1="600" y1="280" x2="930" y2="170"/>
    <line x1="600" y1="280" x2="930" y2="390"/>
  </g>
  <!-- satellites -->
  <g class="body" font-size="17" fill="#14161A">
    <g transform="translate(150,138)"><rect x="0" y="0" width="240" height="64" fill="#FFFFFF" stroke="#2440C8" stroke-width="1.5"/><text x="20" y="30" class="mono" font-size="12" letter-spacing="1" fill="#2440C8">SATELLITE</text><text x="20" y="52">sottodomanda</text></g>
    <g transform="translate(150,358)"><rect x="0" y="0" width="240" height="64" fill="#FFFFFF" stroke="#2440C8" stroke-width="1.5"/><text x="20" y="30" class="mono" font-size="12" letter-spacing="1" fill="#2440C8">SATELLITE</text><text x="20" y="52">sottodomanda</text></g>
    <g transform="translate(810,138)"><rect x="0" y="0" width="240" height="64" fill="#FFFFFF" stroke="#2440C8" stroke-width="1.5"/><text x="20" y="30" class="mono" font-size="12" letter-spacing="1" fill="#2440C8">SATELLITE</text><text x="20" y="52">sottodomanda</text></g>
    <g transform="translate(810,358)"><rect x="0" y="0" width="240" height="64" fill="#FFFFFF" stroke="#2440C8" stroke-width="1.5"/><text x="20" y="30" class="mono" font-size="12" letter-spacing="1" fill="#2440C8">SATELLITE</text><text x="20" y="52">sottodomanda</text></g>
  </g>
  <!-- pillar center -->
  <g transform="translate(460,236)">
    <rect x="0" y="0" width="280" height="88" fill="#2440C8"/>
    <text x="28" y="34" class="mono" font-size="13" letter-spacing="2" fill="#C9D2FF">PILASTRO</text>
    <text x="28" y="68" class="disp" font-size="30" fill="#FFFFFF">il tema, intero</text>
  </g>
  <text x="80" y="464" class="body" font-size="15" fill="#5A5E66">Un grappolo coerente dice a Google «di questo argomento sappiamo tutto» — più di 100 pagine sparse.</text>
</svg>
