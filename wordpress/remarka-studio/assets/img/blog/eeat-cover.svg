<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="E-E-A-T">
  <defs>
    <pattern id="gridE" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridE)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">SEARCH QUALITY RATER GUIDELINES</text>
  <text x="80" y="252" class="disp" font-size="128" letter-spacing="4" fill="#14161A">E-E-A-T</text>
  <text x="82" y="316" class="body" font-size="30" font-weight="600" fill="#14161A">Experience · Expertise · Authoritativeness · Trust</text>
  <!-- four pillars -->
  <g transform="translate(80,380)">
    <g>
      <rect x="0" y="60" width="150" height="150" fill="#5B73E8"/>
      <text x="75" y="150" class="disp" font-size="60" fill="#FFFFFF" text-anchor="middle">E</text>
      <text x="75" y="238" class="mono" font-size="15" fill="#5A5E66" text-anchor="middle">Experience</text>
    </g>
    <g transform="translate(180,0)">
      <rect x="0" y="60" width="150" height="150" fill="#5B73E8"/>
      <text x="75" y="150" class="disp" font-size="60" fill="#FFFFFF" text-anchor="middle">E</text>
      <text x="75" y="238" class="mono" font-size="15" fill="#5A5E66" text-anchor="middle">Expertise</text>
    </g>
    <g transform="translate(360,0)">
      <rect x="0" y="60" width="150" height="150" fill="#2440C8"/>
      <text x="75" y="150" class="disp" font-size="60" fill="#FFFFFF" text-anchor="middle">A</text>
      <text x="75" y="238" class="mono" font-size="15" fill="#5A5E66" text-anchor="middle">Authoritativeness</text>
    </g>
    <g transform="translate(540,0)">
      <rect x="0" y="0" width="150" height="210" fill="#14161A"/>
      <text x="75" y="120" class="disp" font-size="70" fill="#FFFFFF" text-anchor="middle">T</text>
      <text x="75" y="238" class="mono" font-size="15" fill="#2440C8" text-anchor="middle">Trust · core</text>
    </g>
  </g>
</svg>
