<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Google Business Profile">
  <defs>
    <pattern id="gridGb" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}</style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridGb)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">GOOGLE BUSINESS PROFILE</text>
  <text x="80" y="236" class="disp" font-size="76" letter-spacing="1" fill="#14161A">LA VETRINA</text>
  <text x="80" y="312" class="disp" font-size="76" letter-spacing="1" fill="#14161A">GRATUITA</text>
  <text x="84" y="372" class="body" font-size="30" font-weight="600" fill="#2440C8">che quasi nessuno cura</text>
  <text x="84" y="414" class="mono" font-size="19" fill="#5A5E66">la vede più gente della vostra home</text>
  <!-- business card mock -->
  <g transform="translate(700,452)">
    <rect x="0" y="0" width="420" height="140" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="22" y="40" class="body" font-size="22" fill="#2440C8">La Vostra Attività</text>
    <text x="22" y="72" class="mono" font-size="14" fill="#E0A21A">★★★★★</text>
    <text x="150" y="72" class="mono" font-size="13" fill="#5A5E66">4,8 · 126 recensioni</text>
    <text x="22" y="104" class="mono" font-size="13" fill="#14161A">Aperto ora · chiude alle 19:00</text>
    <text x="22" y="128" class="mono" font-size="13" fill="#14161A">Milano · via …, 2a</text>
  </g>
</svg>
