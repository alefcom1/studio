<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Link interni: dalle pagine forti verso le pagine da spingere, con anchor descrittivi invece di clicca qui">
  <defs>
    <pattern id="gridLis" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <marker id="arrLi" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0 0L8 3L0 6Z" fill="#2440C8"/>
    </marker>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="500" fill="#F7F6F2"/>
  <rect width="1200" height="500" fill="url(#gridLis)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">LINK INTERNI — DALLE PAGINE FORTI A QUELLE DA SPINGERE</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <!-- strong page -->
  <g transform="translate(80,150)">
    <rect x="0" y="0" width="320" height="180" fill="#2440C8"/>
    <text x="28" y="44" class="mono" font-size="13" letter-spacing="2" fill="#C9D2FF">PAGINA FORTE</text>
    <text x="28" y="96" class="disp" font-size="38" fill="#FFFFFF">home,</text>
    <text x="28" y="140" class="disp" font-size="38" fill="#FFFFFF">articoli top</text>
    <text x="28" y="168" class="mono" font-size="13" fill="#C9D2FF">accumulano autorevolezza</text>
  </g>
  <!-- arrow with anchor label -->
  <line x1="400" y1="240" x2="800" y2="240" stroke="#2440C8" stroke-width="3" marker-end="url(#arrLi)"/>
  <g transform="translate(430,196)">
    <rect x="0" y="0" width="340" height="34" fill="#EEF1FE" stroke="#2440C8" stroke-width="1"/>
    <text x="16" y="23" class="mono" font-size="14" fill="#2440C8">anchor: «guida ai Core Web Vitals»</text>
  </g>
  <text x="430" y="286" class="body" font-size="15" fill="#9AA0AA">non «clicca qui»</text>
  <!-- weak page -->
  <g transform="translate(800,150)">
    <rect x="0" y="0" width="320" height="180" fill="#14161A"/>
    <text x="28" y="44" class="mono" font-size="13" letter-spacing="2" fill="#9AA0AA">PAGINA DA SPINGERE</text>
    <text x="28" y="96" class="disp" font-size="38" fill="#FFFFFF">la pagina</text>
    <text x="28" y="140" class="disp" font-size="38" fill="#FFFFFF">che conta</text>
    <text x="28" y="168" class="mono" font-size="13" fill="#9AA0AA">riceve la spinta</text>
  </g>
  <text x="80" y="416" class="body" font-size="15" fill="#5A5E66">Nessuna pagina orfana: ogni pagina importante deve ricevere almeno un link interno descrittivo.</text>
</svg>
