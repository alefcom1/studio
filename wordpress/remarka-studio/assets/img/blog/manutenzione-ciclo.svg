<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Il ciclo di manutenzione di un sito WordPress">
  <defs>
    <pattern id="gridMk" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}</style>
  </defs>
  <rect width="1200" height="500" fill="#F7F6F2"/>
  <rect width="1200" height="500" fill="url(#gridMk)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">IL CICLO, FATTO BENE</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <!-- four steps -->
  <g transform="translate(80,150)">
    <rect x="0" y="0" width="230" height="130" fill="#FFFFFF" stroke="#2440C8" stroke-width="1.5"/>
    <rect x="0" y="0" width="230" height="8" fill="#2440C8"/>
    <text x="22" y="48" class="mono" font-size="14" fill="#2440C8">01</text>
    <text x="22" y="84" class="body" font-size="24" fill="#14161A">Backup</text>
    <text x="22" y="112" class="mono" font-size="13" fill="#5A5E66">database e file, verificati</text>
  </g>
  <g transform="translate(350,150)">
    <rect x="0" y="0" width="230" height="130" fill="#FFFFFF" stroke="#2440C8" stroke-width="1.5"/>
    <rect x="0" y="0" width="230" height="8" fill="#2440C8"/>
    <text x="22" y="48" class="mono" font-size="14" fill="#2440C8">02</text>
    <text x="22" y="84" class="body" font-size="24" fill="#14161A">Aggiorna</text>
    <text x="22" y="112" class="mono" font-size="13" fill="#5A5E66">core, plugin, tema</text>
  </g>
  <g transform="translate(620,150)">
    <rect x="0" y="0" width="230" height="130" fill="#FFFFFF" stroke="#2440C8" stroke-width="1.5"/>
    <rect x="0" y="0" width="230" height="8" fill="#2440C8"/>
    <text x="22" y="48" class="mono" font-size="14" fill="#2440C8">03</text>
    <text x="22" y="84" class="body" font-size="24" fill="#14161A">Test</text>
    <text x="22" y="112" class="mono" font-size="13" fill="#5A5E66">su ambiente di prova</text>
  </g>
  <g transform="translate(890,150)">
    <rect x="0" y="0" width="230" height="130" fill="#14161A"/>
    <rect x="0" y="0" width="230" height="8" fill="#E0A21A"/>
    <text x="22" y="48" class="mono" font-size="14" fill="#E0A21A">04</text>
    <text x="22" y="84" class="body" font-size="24" fill="#F7F6F2">Monitora</text>
    <text x="22" y="112" class="mono" font-size="13" fill="#9AA0AA">uptime, velocità, integrità</text>
  </g>
  <!-- arrows between -->
  <g fill="#2440C8"><path d="M312 215 L332 205 L332 225 Z"/><path d="M582 215 L602 205 L602 225 Z"/><path d="M852 215 L872 205 L872 225 Z"/></g>
  <!-- loop back note -->
  <g transform="translate(80,340)">
    <rect x="0" y="0" width="1040" height="90" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="28" y="40" class="mono" font-size="14" fill="#2440C8">↻ SI RIPETE</text>
    <text x="28" y="70" class="body" font-size="19" fill="#14161A">senza un backup che funziona, un aggiornamento andato male è un disastro; con quello, è un contrattempo di dieci minuti</text>
  </g>
</svg>
