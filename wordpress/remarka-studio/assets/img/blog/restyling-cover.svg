<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Restyling o sito nuovo: il test delle cinque domande">
  <defs>
    <pattern id="gridRsc" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridRsc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">RESTYLING O SITO NUOVO?</text>
  <text x="80" y="266" class="disp" font-size="128" letter-spacing="1" fill="#14161A">5 domande</text>
  <text x="84" y="328" class="body" font-size="34" font-weight="600" fill="#14161A">ritoccare o ripartire da zero?</text>
  <text x="84" y="372" class="mono" font-size="20" fill="#5A5E66">decidere con i numeri, non a sensazione</text>
  <!-- decision axis -->
  <g transform="translate(80,440)">
    <rect x="0" y="0" width="470" height="120" fill="none" stroke="#2440C8" stroke-width="1.5"/>
    <text x="24" y="42" class="mono" font-size="14" letter-spacing="2" fill="#2440C8">POCHI «SÌ» · SULL'ASPETTO</text>
    <text x="24" y="90" class="disp" font-size="42" fill="#14161A">RESTYLING</text>
  </g>
  <g transform="translate(570,440)">
    <rect x="0" y="0" width="470" height="120" fill="#14161A"/>
    <text x="24" y="42" class="mono" font-size="14" letter-spacing="2" fill="#9AA0AA">MOLTI «SÌ» · SULLE FONDAMENTA</text>
    <text x="24" y="90" class="disp" font-size="42" fill="#FFFFFF">SITO NUOVO</text>
  </g>
</svg>
