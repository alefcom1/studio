<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-label="Timeline European Accessibility Act 2019-2025">
  <defs>
    <pattern id="gridT" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="470" fill="#F7F6F2"/>
  <rect width="1200" height="470" fill="url(#gridT)"/>
  <text x="80" y="66" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">EAA — DIR. UE 2019/882</text>
  <line x1="80" y1="84" x2="1120" y2="84" stroke="#14161A" stroke-width="1.5"/>
  <line x1="150" y1="235" x2="1050" y2="235" stroke="#DDDBD4" stroke-width="3"/>
  <line x1="150" y1="235" x2="900" y2="235" stroke="#2440C8" stroke-width="3"/>
  <g transform="translate(150,235)">
    <circle r="11" fill="#14161A"/>
    <text x="0" y="-34" class="disp" font-size="32" fill="#14161A" text-anchor="middle">2019</text>
    <text x="0" y="52" class="mono" font-size="15" fill="#5A5E66" text-anchor="middle">2019/882</text>
  </g>
  <g transform="translate(525,235)">
    <circle r="11" fill="#14161A"/>
    <text x="0" y="-34" class="disp" font-size="32" fill="#14161A" text-anchor="middle">2022</text>
    <text x="0" y="52" class="mono" font-size="15" fill="#5A5E66" text-anchor="middle">IT</text>
  </g>
  <g transform="translate(900,235)">
    <circle r="15" fill="#2440C8"/>
    <text x="0" y="-42" class="disp" font-size="40" fill="#2440C8" text-anchor="middle">28.06.2025</text>
    <text x="0" y="58" class="mono" font-size="16" fill="#2440C8" text-anchor="middle">EU · LIVE</text>
  </g>
  <g transform="translate(980,320)">
    <rect x="0" y="0" width="140" height="112" fill="#14161A"/>
    <text x="70" y="34" class="mono" font-size="13" letter-spacing="1" fill="#9AA0AA" text-anchor="middle">MAX €</text>
    <text x="70" y="88" class="disp" font-size="54" fill="#FFFFFF" text-anchor="middle">5%</text>
  </g>
  <g transform="translate(150,352)">
    <rect x="0" y="0" width="360" height="84" fill="none" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="20" y="34" class="mono" font-size="14" letter-spacing="2" fill="#5A5E66">MICRO</text>
    <text x="20" y="66" class="body" font-size="24" font-weight="600" fill="#14161A">&lt; 10 · &lt; € 2M</text>
  </g>
</svg>
