<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Tradurre un sito non è localizzare un sito">
  <defs>
    <pattern id="gridLoc" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridLoc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — БЛОГ</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">ЛОКАЛИЗАЦИЯ · 2026</text>
  <text x="80" y="196" class="disp" font-size="76" letter-spacing="1" fill="#5A5E66">перевести</text>
  <text x="560" y="196" class="disp" font-size="76" letter-spacing="1" fill="#DDDBD4">&#8800;</text>
  <text x="80" y="284" class="disp" font-size="76" letter-spacing="1" fill="#14161A">локализовать</text>
  <text x="84" y="340" class="body" font-size="34" font-weight="600" fill="#14161A">почему это две разные работы</text>
  <text x="84" y="382" class="mono" font-size="20" fill="#5A5E66">слова совпадают — смысл, деньги и валюта нет</text>
  <g transform="translate(80,420)">
    <rect x="0" y="0" width="500" height="120" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="24" y="40" class="mono" font-size="13" letter-spacing="2" fill="#5A5E66">ПЕРЕВОД</text>
    <text x="24" y="80" class="body" font-size="22" fill="#5A5E66">те же слова на другом языке</text>
    <text x="24" y="108" class="body" font-size="17" fill="#5A5E66">меню, инструкция, надпись</text>
  </g>
  <g transform="translate(620,420)">
    <rect x="0" y="0" width="500" height="120" fill="#2440C8"/>
    <text x="24" y="40" class="mono" font-size="13" letter-spacing="2" fill="#C9D2FF">ЛОКАЛИЗАЦИЯ</text>
    <text x="24" y="80" class="body" font-size="22" fill="#FFFFFF">формат, валюта, культура, право</text>
    <text x="24" y="108" class="body" font-size="17" fill="#C9D2FF">продающая страница, checkout</text>
  </g>
</svg>
