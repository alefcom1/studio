<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Landing page che converte: una pagina con un solo scopo">
  <defs>
    <pattern id="gridLpc" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridLpc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">LANDING PAGE · 2026</text>
  <text x="80" y="232" class="disp" font-size="88" letter-spacing="1" fill="#14161A">Una pagina.</text>
  <text x="80" y="318" class="disp" font-size="88" letter-spacing="1" fill="#14161A">Un solo scopo.</text>
  <text x="84" y="378" class="mono" font-size="20" fill="#5A5E66">anatomia di una landing che trasforma le visite in richieste</text>
  <!-- mini wireframe of a landing -->
  <g transform="translate(760,150)">
    <rect x="0" y="0" width="360" height="420" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <rect x="30" y="34" width="220" height="26" fill="#14161A"/>
    <rect x="30" y="72" width="300" height="12" fill="#DDDBD4"/>
    <rect x="30" y="92" width="260" height="12" fill="#DDDBD4"/>
    <rect x="30" y="126" width="150" height="40" fill="#2440C8"/>
    <text x="46" y="152" class="mono" font-size="14" fill="#FFFFFF">CTA →</text>
    <rect x="30" y="196" width="140" height="86" fill="#EEF1FE" stroke="#2440C8" stroke-width="1"/>
    <rect x="190" y="196" width="140" height="86" fill="#EEF1FE" stroke="#2440C8" stroke-width="1"/>
    <text x="42" y="228" class="mono" font-size="12" fill="#2440C8">★★★★★</text>
    <text x="202" y="228" class="mono" font-size="12" fill="#2440C8">caso reale</text>
    <rect x="30" y="308" width="300" height="14" fill="#DDDBD4"/>
    <rect x="30" y="332" width="300" height="40" fill="#2440C8"/>
    <text x="46" y="358" class="mono" font-size="14" fill="#FFFFFF">Richiedi il preventivo →</text>
  </g>
  <text x="760" y="600" class="mono" font-size="14" fill="#9AA0AA">niente menù · niente vie di fuga · un invito ripetuto</text>
</svg>
