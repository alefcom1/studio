<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-label="Le sette fughe silenziose che impediscono a un sito di convertire, dalla più frequente">
  <defs>
    <pattern id="gridN7" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="540" fill="#F7F6F2"/>
  <rect width="1200" height="540" fill="url(#gridN7)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">LE SETTE FUGHE — DALLA PIÙ FREQUENTE NEGLI AUDIT</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <g class="body" font-size="18">
    <g transform="translate(80,110)">
      <rect x="0" y="0" width="34" height="34" fill="#2440C8"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">1</text>
      <text x="52" y="24" fill="#14161A">Sito lento: ogni secondo di attesa è conversione persa</text>
    </g>
    <g transform="translate(80,158)">
      <rect x="0" y="0" width="34" height="34" fill="#2440C8"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">2</text>
      <text x="52" y="24" fill="#14161A">Mobile trascurato: pulsanti piccoli, moduli fuori schermo</text>
    </g>
    <g transform="translate(80,206)">
      <rect x="0" y="0" width="34" height="34" fill="#2440C8"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">3</text>
      <text x="52" y="24" fill="#14161A">Invito all’azione debole: la pagina non dice cosa fare</text>
    </g>
    <g transform="translate(80,254)">
      <rect x="0" y="0" width="34" height="34" fill="#5B73E8"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">4</text>
      <text x="52" y="24" fill="#14161A">Modulo troppo lungo: ogni campo in più è una rinuncia</text>
    </g>
    <g transform="translate(80,302)">
      <rect x="0" y="0" width="34" height="34" fill="#5B73E8"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">5</text>
      <text x="52" y="24" fill="#14161A">Manca la fiducia: né volti, né indirizzo, né casi reali</text>
    </g>
    <g transform="translate(80,350)">
      <rect x="0" y="0" width="34" height="34" fill="#5B73E8"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">6</text>
      <text x="52" y="24" fill="#14161A">Testo che parla di voi, non al cliente</text>
    </g>
    <g transform="translate(80,398)">
      <rect x="0" y="0" width="34" height="34" fill="#14161A"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">7</text>
      <text x="52" y="24" fill="#14161A">Barriere di accessibilità: chi non completa, se ne va</text>
    </g>
  </g>
  <g transform="translate(80,452)">
    <rect x="0" y="0" width="1040" height="46" fill="#EEF1FE" stroke="#2440C8" stroke-width="1"/>
    <text x="18" y="29" class="mono" font-size="15" fill="#2440C8">Si tappano misurando, non a sensazione: prima le fughe che costano poco e rendono molto (1–3).</text>
  </g>
</svg>
