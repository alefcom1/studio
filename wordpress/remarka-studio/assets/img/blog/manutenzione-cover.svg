<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Manutenzione WordPress">
  <defs>
    <pattern id="gridMc" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}</style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridMc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">MANUTENZIONE WORDPRESS</text>
  <text x="80" y="240" class="disp" font-size="82" letter-spacing="1" fill="#14161A">MANUTENZIONE</text>
  <text x="84" y="304" class="body" font-size="32" font-weight="600" fill="#14161A">cosa succede se non la fate</text>
  <text x="84" y="348" class="mono" font-size="20" fill="#5A5E66">un sito non aggiornato non «resta com'è»: invecchia e si buca</text>
  <!-- shield + stat -->
  <g transform="translate(700,430)">
    <rect x="0" y="0" width="420" height="160" fill="#14161A"/>
    <text x="28" y="46" class="mono" font-size="14" fill="#9AA0AA">VULNERABILITÀ WORDPRESS · 2024</text>
    <text x="28" y="112" class="disp" font-size="70" fill="#F7F6F2">96%</text>
    <text x="200" y="96" class="body" font-size="19" fill="#F7F6F2">nei plugin,</text>
    <text x="200" y="122" class="body" font-size="19" fill="#F7F6F2">non nel core</text>
    <text x="28" y="146" class="mono" font-size="12" fill="#9AA0AA">fonte: Patchstack</text>
  </g>
</svg>
