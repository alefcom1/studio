<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Area clienti di un'agenzia web">
  <defs>
    <pattern id="gridAc" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}</style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridAc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">AREA CLIENTI</text>
  <text x="80" y="230" class="disp" font-size="76" letter-spacing="1" fill="#14161A">AREA CLIENTI</text>
  <text x="84" y="292" class="body" font-size="31" font-weight="600" fill="#14161A">cosa pretendere dal vostro fornitore</text>
  <text x="84" y="336" class="mono" font-size="19" fill="#5A5E66">il progetto si vede — o vive nella testa di qualcuno</text>
  <!-- mini portal: stepper card -->
  <g transform="translate(720,380)">
    <rect x="0" y="0" width="400" height="210" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <rect x="0" y="0" width="400" height="8" fill="#2440C8"/>
    <text x="24" y="42" class="mono" font-size="13" letter-spacing="2" fill="#5A5E66">CAB.REMARKA.BIZ</text>
    <!-- stepper -->
    <g transform="translate(24,70)">
      <line x1="10" y1="14" x2="340" y2="14" stroke="#DDDBD4" stroke-width="2"/>
      <circle cx="10" cy="14" r="9" fill="#1E7F4F"/>
      <circle cx="65" cy="14" r="9" fill="#1E7F4F"/>
      <circle cx="120" cy="14" r="9" fill="#1E7F4F"/>
      <circle cx="175" cy="14" r="11" fill="#2440C8"/>
      <circle cx="230" cy="14" r="9" fill="#FFFFFF" stroke="#9AA0AA" stroke-width="2"/>
      <circle cx="285" cy="14" r="9" fill="#FFFFFF" stroke="#9AA0AA" stroke-width="2"/>
      <circle cx="340" cy="14" r="9" fill="#FFFFFF" stroke="#9AA0AA" stroke-width="2"/>
      <text x="175" y="52" class="mono" font-size="12" fill="#2440C8" text-anchor="middle">04/08</text>
    </g>
    <!-- approvals row -->
    <g transform="translate(24,140)">
      <rect x="0" y="0" width="230" height="26" fill="#F7F6F2" stroke="#DDDBD4"/>
      <text x="10" y="18" class="mono" font-size="12" fill="#14161A">v2 — OK</text>
      <text x="250" y="18" class="mono" font-size="12" fill="#1E7F4F">✓ 14:32</text>
    </g>
    <g transform="translate(24,174)">
      <rect x="0" y="0" width="230" height="26" fill="#F7F6F2" stroke="#DDDBD4"/>
      <text x="10" y="18" class="mono" font-size="12" fill="#14161A">PDF · €</text>
      <text x="250" y="18" class="mono" font-size="12" fill="#5A5E66">IT/EN/RU</text>
    </g>
  </g>
  <!-- bottom-left stat -->
  <g transform="translate(80,430)">
    <rect x="0" y="0" width="420" height="160" fill="#14161A"/>
    <text x="28" y="46" class="mono" font-size="14" fill="#9AA0AA">SEGNI DI SERIETÀ · CHECKLIST</text>
    <text x="28" y="118" class="disp" font-size="70" fill="#F7F6F2">6</text>
    <text x="110" y="96" class="body" font-size="19" fill="#F7F6F2">cose da vedere</text>
    <text x="110" y="122" class="body" font-size="19" fill="#F7F6F2">prima di firmare</text>
  </g>
</svg>
