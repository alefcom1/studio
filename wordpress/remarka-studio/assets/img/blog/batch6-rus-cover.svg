<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Il pubblico russofono in Europa e la ricerca">
  <defs>
    <pattern id="gridRus" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridRus)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — БЛОГ</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">АУДИТОРИЯ ЕС · ПОИСК</text>
  <text x="80" y="234" class="disp" font-size="58" letter-spacing="1" fill="#14161A">РУССКОЯЗЫЧНАЯ ЕВРОПА</text>
  <text x="84" y="298" class="body" font-size="34" font-weight="600" fill="#14161A">как её находят в поиске</text>
  <text x="84" y="342" class="mono" font-size="20" fill="#5A5E66">большой тёплый спрос · конкуренция почти пустая</text>
  <g transform="translate(80,428)">
    <rect x="0" y="0" width="320" height="88" fill="#2440C8"/>
    <text x="24" y="34" class="mono" font-size="13" letter-spacing="2" fill="#C9D2FF">ЗАПРОС</text>
    <text x="24" y="72" class="disp" font-size="26" fill="#FFFFFF">услуга + город</text>
  </g>
  <g transform="translate(420,428)">
    <rect x="0" y="0" width="280" height="88" fill="none" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="34" class="mono" font-size="13" letter-spacing="2" fill="#5A5E66">ЗВЕНО</text>
    <text x="24" y="72" class="disp" font-size="30" fill="#14161A">hreflang</text>
  </g>
  <g transform="translate(880,150)">
    <rect x="0" y="0" width="240" height="240" fill="none" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="20" y="46" class="mono" font-size="15" fill="#5A5E66">ЧТО НУЖНО</text>
    <text x="20" y="96" class="body" font-size="21" fill="#14161A">версия RU</text>
    <text x="20" y="140" class="body" font-size="21" fill="#14161A">hreflang</text>
    <text x="20" y="184" class="body" font-size="21" fill="#14161A">локальный</text>
    <text x="20" y="228" class="body" font-size="21" fill="#2440C8">сигнал</text>
  </g>
</svg>
