<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Sito lento: le sette cause reali">
  <defs>
    <pattern id="gridLc" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridLc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">PERFORMANCE · MOBILE</text>
  <text x="80" y="270" class="disp" font-size="150" letter-spacing="1" fill="#14161A">7 cause</text>
  <text x="84" y="332" class="body" font-size="34" font-weight="600" fill="#14161A">perché il sito è lento (e quanto costa)</text>
  <text x="84" y="376" class="mono" font-size="20" fill="#5A5E66">dalla più frequente · costo dell’intervento</text>
  <!-- bottom metric boxes -->
  <g transform="translate(80,430)">
    <rect x="0" y="0" width="230" height="92" fill="none" stroke="#cc3333" stroke-width="1.5"/>
    <text x="24" y="37" class="mono" font-size="14" letter-spacing="2" fill="#5A5E66">CARICAMENTO</text>
    <text x="24" y="76" class="disp" font-size="40" fill="#cc3333">4 s</text>
  </g>
  <g transform="translate(340,430)">
    <rect x="0" y="0" width="230" height="92" fill="#1E7F4F"/>
    <text x="24" y="37" class="mono" font-size="14" letter-spacing="2" fill="#BFE6CE">RESTYLING DA</text>
    <text x="24" y="76" class="disp" font-size="34" fill="#FFFFFF">€ 2.900</text>
  </g>
  <!-- speedometer motif right -->
  <g transform="translate(900,300)">
    <path d="M -150 0 A 150 150 0 0 1 150 0" fill="none" stroke="#EBEAE4" stroke-width="26"/>
    <path d="M -150 0 A 150 150 0 0 1 -30 -147" fill="none" stroke="#cc3333" stroke-width="26" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="96" y2="-96" stroke="#14161A" stroke-width="6" stroke-linecap="round"/>
    <circle r="14" fill="#14161A"/>
    <text x="0" y="46" class="mono" font-size="16" fill="#5A5E66" text-anchor="middle">LENTO / SLOW</text>
  </g>
</svg>
