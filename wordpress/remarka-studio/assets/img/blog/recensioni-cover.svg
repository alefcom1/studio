<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Recensioni e riprova sociale: usarle senza inventarle">
  <defs>
    <pattern id="gridRcc" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridRcc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">RECENSIONI · FIDUCIA</text>
  <text x="80" y="232" class="disp" font-size="88" letter-spacing="1" fill="#14161A">Recensioni vere.</text>
  <text x="80" y="318" class="disp" font-size="88" letter-spacing="1" fill="#14161A">Fiducia vera.</text>
  <text x="84" y="378" class="mono" font-size="20" fill="#5A5E66">usare la riprova sociale senza inventarla — e più efficace del falso</text>
  <!-- one honest review card -->
  <g transform="translate(80,432)">
    <rect x="0" y="0" width="640" height="140" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="24" y="42" class="mono" font-size="22" fill="#2440C8">★★★★★</text>
    <text x="150" y="42" class="mono" font-size="14" fill="#5A5E66">— Laura M. · 12 marzo 2026</text>
    <text x="24" y="80" class="body" font-size="17" fill="#14161A">«Consegnato nei tempi promessi, sito veloce. Rifarei.»</text>
    <text x="24" y="116" class="mono" font-size="13" fill="#5A5E66">↳ Risposta: «Grazie Laura, a presto!»</text>
  </g>
  <g transform="translate(760,432)">
    <rect x="0" y="0" width="360" height="140" fill="#14161A"/>
    <text x="24" y="44" class="mono" font-size="14" letter-spacing="2" fill="#9AA0AA">VIETATO DAL 2022 (UE)</text>
    <text x="24" y="86" class="body" font-size="19" fill="#FFFFFF">Recensioni false</text>
    <text x="24" y="116" class="mono" font-size="14" fill="#C9D2FF">illegali · e si sentono a naso</text>
  </g>
</svg>
