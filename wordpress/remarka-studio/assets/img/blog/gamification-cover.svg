<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Gamification nel B2B">
  <defs>
    <pattern id="gridGac" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}</style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridGac)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">MARKETING B2B</text>
  <text x="80" y="256" class="disp" font-size="118" letter-spacing="1" fill="#14161A">GAMIFICATION</text>
  <text x="84" y="318" class="body" font-size="34" font-weight="600" fill="#14161A">quando un gioco vende servizi seri</text>
  <text x="84" y="362" class="mono" font-size="20" fill="#5A5E66">non un gadget: un contenuto che trattiene e racconta</text>
  <!-- real numbers from our game -->
  <g transform="translate(80,410)">
    <rect x="0" y="0" width="330" height="158" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="24" y="44" class="mono" font-size="14" fill="#5A5E66">IL NOSTRO GIOCO, NUMERI VERI</text>
    <text x="24" y="102" class="disp" font-size="52" fill="#2440C8">984</text>
    <text x="150" y="102" class="body" font-size="22" fill="#14161A">partite</text>
    <text x="24" y="140" class="mono" font-size="15" fill="#14161A">12.086 minuti sul sito</text>
  </g>
  <g transform="translate(440,410)">
    <rect x="0" y="0" width="680" height="158" fill="#14161A"/>
    <rect x="0" y="0" width="680" height="8" fill="#5B73E8"/>
    <text x="26" y="46" class="mono" font-size="14" fill="#9AA0AA">PERCHÉ FUNZIONA</text>
    <g class="mono" font-size="16" fill="#F7F6F2"><text x="26" y="86">▸ autonomia — scegliere</text><text x="26" y="118">▸ competenza — migliorare</text><text x="360" y="86">▸ relazione — dare senso</text><text x="360" y="118">▸ tempo sul sito = qualità</text></g>
  </g>
</svg>
