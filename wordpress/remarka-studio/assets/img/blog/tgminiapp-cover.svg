<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Telegram Mini App per il business">
  <defs>
    <pattern id="gridTma" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}</style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridTma)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">DENTRO TELEGRAM</text>
  <text x="80" y="260" class="disp" font-size="128" letter-spacing="1" fill="#14161A">MINI APP</text>
  <text x="84" y="322" class="body" font-size="34" font-weight="600" fill="#14161A">un'app dentro la chat, senza installare niente</text>
  <text x="84" y="366" class="mono" font-size="20" fill="#5A5E66">ordini · prenotazioni · pagamenti — dove i clienti già scrivono</text>
  <!-- phone with mini app -->
  <g transform="translate(80,414)">
    <rect x="0" y="0" width="250" height="150" rx="14" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <rect x="0" y="0" width="250" height="34" rx="14" fill="#2440C8"/>
    <rect x="0" y="20" width="250" height="14" fill="#2440C8"/>
    <text x="18" y="23" class="mono" font-size="13" fill="#FFFFFF">TELEGRAM · MINI APP</text>
    <rect x="18" y="52" width="214" height="24" fill="#F0EFEA"/>
    <rect x="18" y="86" width="150" height="24" fill="#F0EFEA"/>
    <rect x="18" y="120" width="120" height="18" rx="9" fill="#2440C8"/>
    <text x="30" y="133" class="mono" font-size="11" fill="#FFFFFF">CONFERMA</text>
  </g>
  <g transform="translate(360,414)" class="mono" font-size="17" fill="#14161A">
    <text x="0" y="24">▸ niente store, niente download</text>
    <text x="0" y="62">▸ pagamenti e notifiche integrati</text>
    <text x="0" y="100">▸ oltre 1 miliardo di utenti Telegram</text>
    <text x="0" y="138">▸ in Italia, un canale ancora quasi vuoto</text>
  </g>
</svg>
