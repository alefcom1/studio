<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="Пять шагов оформления Google Business Profile">
  <defs>
    <pattern id="gridGbpS" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="600" fill="#F7F6F2"/>
  <rect width="1200" height="600" fill="url(#gridGbpS)"/>
  <line x1="80" y1="86" x2="1120" y2="86" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="72" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">ЧТО ДВИГАЕТ КАРТОЧКУ ВВЕРХ</text>
  <g transform="translate(80,120)"><rect width="330" height="120" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="48" class="disp" font-size="26" fill="#2440C8">1</text><text x="56" y="48" class="body" font-size="19" font-weight="600" fill="#14161A">Категория</text><text x="18" y="88" class="body" font-size="15" fill="#5A5E66">точный вид деятельности</text></g>
  <g transform="translate(435,120)"><rect width="330" height="120" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="48" class="disp" font-size="26" fill="#2440C8">2</text><text x="56" y="48" class="body" font-size="19" font-weight="600" fill="#14161A">Данные NAP</text><text x="18" y="88" class="body" font-size="15" fill="#5A5E66">имя, адрес, телефон — как на сайте</text></g>
  <g transform="translate(790,120)"><rect width="330" height="120" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="48" class="disp" font-size="26" fill="#2440C8">3</text><text x="56" y="48" class="body" font-size="19" font-weight="600" fill="#14161A">Фото</text><text x="18" y="88" class="body" font-size="15" fill="#5A5E66">настоящие снимки места и работ</text></g>
  <g transform="translate(80,270)"><rect width="330" height="120" fill="#2440C8"/><text x="18" y="48" class="disp" font-size="26" fill="#FFFFFF">4</text><text x="56" y="48" class="body" font-size="19" font-weight="600" fill="#FFFFFF">Отзывы</text><text x="18" y="88" class="body" font-size="15" fill="#C9D2FF">просить и отвечать на каждый</text></g>
  <g transform="translate(435,270)"><rect width="330" height="120" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="48" class="disp" font-size="26" fill="#2440C8">5</text><text x="56" y="48" class="body" font-size="19" font-weight="600" fill="#14161A">Обновления</text><text x="18" y="88" class="body" font-size="15" fill="#5A5E66">новости, услуги, ответы на вопросы</text></g>
  <text x="80" y="470" class="mono" font-size="15" fill="#5A5E66">Карточка — не «настроил и забыл»: живой профиль ранжируется выше.</text>
  <text x="80" y="500" class="mono" font-size="15" fill="#5A5E66">Источник: Google Business Profile Help · Google Search Central.</text>
</svg>
