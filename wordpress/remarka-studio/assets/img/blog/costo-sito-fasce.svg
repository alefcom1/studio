<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-label="Le fasce di prezzo di un sito aziendale in Italia">
  <defs>
    <pattern id="gridCsd" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="470" fill="#F7F6F2"/>
  <rect width="1200" height="470" fill="url(#gridCsd)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">SITO AZIENDALE — FASCE DI PREZZO / PRICE BANDS · ITALIA 2026</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <!-- band 1 -->
  <g transform="translate(80,110)">
    <rect x="0" y="0" width="180" height="290" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <rect x="0" y="0" width="180" height="8" fill="#DDDBD4"/>
    <text x="20" y="52" class="mono" font-size="15" fill="#5A5E66">FAI-DA-TE</text>
    <text x="20" y="96" class="body" font-size="26" fill="#14161A">&lt; € 1.000</text>
    <g class="mono" font-size="15" fill="#14161A">
      <text x="20" y="150">▸ template pronto</text>
      <text x="20" y="184">▸ poco su misura</text>
      <text x="20" y="218">▸ lento su mobile</text>
    </g>
  </g>
  <!-- band 2 (professionale) -->
  <g transform="translate(290,110)">
    <rect x="0" y="0" width="500" height="290" fill="#FFFFFF" stroke="#2440C8" stroke-width="1.5"/>
    <rect x="0" y="0" width="500" height="8" fill="#2440C8"/>
    <text x="24" y="52" class="mono" font-size="15" fill="#2440C8">PROFESSIONALE · IL GROSSO DEL MERCATO</text>
    <text x="24" y="96" class="body" font-size="26" fill="#14161A">€ 2.500 – 8.000</text>
    <g class="mono" font-size="15" fill="#14161A">
      <text x="24" y="150">▸ design su misura · CMS</text>
      <text x="24" y="184">▸ SEO tecnica · più lingue</text>
      <text x="24" y="218">▸ contenuti veri</text>
    </g>
    <g transform="translate(24,238)">
      <rect x="0" y="0" width="452" height="36" fill="#EEF1FE" stroke="#2440C8" stroke-width="1"/>
      <text x="14" y="24" class="mono" font-size="14" fill="#2440C8">NOI: € 3.900–5.800 · prezzo chiuso · PageSpeed 90+</text>
    </g>
  </g>
  <!-- band 3 -->
  <g transform="translate(820,110)">
    <rect x="0" y="0" width="300" height="290" fill="#14161A"/>
    <rect x="0" y="0" width="300" height="8" fill="#5B73E8"/>
    <text x="24" y="52" class="mono" font-size="15" fill="#9AA0AA">COMPLESSO</text>
    <text x="24" y="96" class="body" font-size="26" fill="#FFFFFF">&gt; € 15.000</text>
    <g class="mono" font-size="15" fill="#F7F6F2">
      <text x="24" y="150">▸ integrazioni gestionali</text>
      <text x="24" y="184">▸ multi-sede</text>
      <text x="24" y="218">▸ strutture complesse</text>
    </g>
  </g>
</svg>
