<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="La checklist in cinque mosse prima di aprire un e-commerce: pagamenti, spedizioni, schede prodotto, velocità, legale">
  <defs>
    <pattern id="gridEcs" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="500" fill="#F7F6F2"/>
  <rect width="1200" height="500" fill="url(#gridEcs)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">CHECKLIST PRIMA DI APRIRE UN E-COMMERCE — CINQUE MOSSE</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <g class="body" font-size="18">
    <g transform="translate(80,112)">
      <rect x="0" y="0" width="34" height="34" fill="#2440C8"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">1</text>
      <text x="52" y="24" fill="#14161A">Metodi di pagamento multipli — nessuno manca al check-out</text>
    </g>
    <g transform="translate(80,164)">
      <rect x="0" y="0" width="34" height="34" fill="#2440C8"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">2</text>
      <text x="52" y="24" fill="#14161A">Spedizione visibile prima, reso di 14 giorni dichiarato</text>
    </g>
    <g transform="translate(80,216)">
      <rect x="0" y="0" width="34" height="34" fill="#5B73E8"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">3</text>
      <text x="52" y="24" fill="#14161A">Prezzo, disponibilità e tempi di consegna reali in scheda</text>
    </g>
    <g transform="translate(80,268)">
      <rect x="0" y="0" width="34" height="34" fill="#5B73E8"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">4</text>
      <text x="52" y="24" fill="#14161A">Ricerca, filtri e velocità sotto controllo (Core Web Vitals)</text>
    </g>
    <g transform="translate(80,320)">
      <rect x="0" y="0" width="34" height="34" fill="#14161A"/>
      <text x="12" y="24" class="mono" font-size="17" fill="#FFFFFF">5</text>
      <text x="52" y="24" fill="#14161A">Cookie, GDPR e condizioni di vendita pubblicate in chiaro</text>
    </g>
  </g>
  <g transform="translate(80,378)">
    <rect x="0" y="0" width="1040" height="52" fill="#EEF1FE" stroke="#2440C8" stroke-width="1"/>
    <text x="20" y="32" class="mono" font-size="15" fill="#2440C8">La voce più trascurata è la seconda: il costo scoperto solo alla fine.</text>
  </g>
</svg>
