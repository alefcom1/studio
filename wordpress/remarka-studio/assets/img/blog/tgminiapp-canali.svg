<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-label="Sito, app nativa, bot e Mini App a confronto">
  <defs>
    <pattern id="gridTmc" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}</style>
  </defs>
  <rect width="1200" height="460" fill="#F7F6F2"/>
  <rect width="1200" height="460" fill="url(#gridTmc)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">QUATTRO MODI DI STARE ONLINE</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <g transform="translate(80,110)">
    <rect x="0" y="0" width="240" height="290" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="20" y="44" class="mono" font-size="14" fill="#5A5E66">SITO WEB</text>
    <text x="20" y="80" class="body" font-size="21" fill="#14161A">Nel browser</text>
    <g class="mono" font-size="14" fill="#14161A"><text x="20" y="130">▸ vive ovunque</text><text x="20" y="164">▸ nessuna installazione</text><text x="20" y="198">▸ va cercato</text></g>
  </g>
  <g transform="translate(340,110)">
    <rect x="0" y="0" width="240" height="290" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="20" y="44" class="mono" font-size="14" fill="#5A5E66">APP NATIVA</text>
    <text x="20" y="80" class="body" font-size="21" fill="#14161A">Dallo store</text>
    <g class="mono" font-size="14" fill="#14161A"><text x="20" y="130">▸ potente</text><text x="20" y="164">▸ da scaricare</text><text x="20" y="198">▸ iOS + Android</text><text x="20" y="232">▸ costo alto</text></g>
  </g>
  <g transform="translate(600,110)">
    <rect x="0" y="0" width="240" height="290" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="20" y="44" class="mono" font-size="14" fill="#5A5E66">BOT TELEGRAM</text>
    <text x="20" y="80" class="body" font-size="21" fill="#14161A">Chat di testo</text>
    <g class="mono" font-size="14" fill="#14161A"><text x="20" y="130">▸ comandi</text><text x="20" y="164">▸ domande/risposte</text><text x="20" y="198">▸ niente interfaccia</text></g>
  </g>
  <g transform="translate(860,110)">
    <rect x="0" y="0" width="260" height="290" fill="#14161A"/>
    <rect x="0" y="0" width="260" height="8" fill="#5B73E8"/>
    <text x="20" y="44" class="mono" font-size="14" fill="#9AA0AA">MINI APP</text>
    <text x="20" y="80" class="body" font-size="21" fill="#FFFFFF">Dentro Telegram</text>
    <g class="mono" font-size="14" fill="#F7F6F2"><text x="20" y="130">▸ app vera in chat</text><text x="20" y="164">▸ zero installazione</text><text x="20" y="198">▸ pagamenti + notifiche</text><text x="20" y="232">▸ dove sono i clienti</text></g>
  </g>
