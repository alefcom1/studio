      <circle cx="30" cy="58" r="10" fill="#2440C8"/><text x="30" y="62" font-size="12" fill="#FFFFFF" text-anchor="middle" class="mono">1</text><text x="52" y="62">La Vostra Attività · ★ 4,8</text>
      <circle cx="30" cy="86" r="10" fill="#9AA0AA"/><text x="30" y="90" font-size="12" fill="#FFFFFF" text-anchor="middle" class="mono">2</text><text x="52" y="90" fill="#5A5E66">Concorrente A</text>
