<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-label="Sei passi per essere a norma GDPR">
  <defs>
    <pattern id="gridGdprS" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="540" fill="#F7F6F2"/>
  <rect width="1200" height="540" fill="url(#gridGdprS)"/>
  <line x1="80" y1="86" x2="1120" y2="86" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="72" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">GDPR ДЛЯ САЙТА — ШЕСТЬ ШАГОВ, КОТОРЫЕ ЗАКРЫВАЮТ 90% РИСКА</text>
  <g transform="translate(80,130)">
    <rect x="0" y="0" width="330" height="120" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="22" y="46" class="disp" font-size="34" fill="#2440C8">1</text>
    <text x="66" y="46" class="body" font-size="22" font-weight="600" fill="#14161A">Карта данных</text>
    <text x="22" y="86" class="body" font-size="17" fill="#5A5E66">что и зачем вы собираете</text>
  </g>
  <g transform="translate(435,130)">
    <rect x="0" y="0" width="330" height="120" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="22" y="46" class="disp" font-size="34" fill="#2440C8">2</text>
    <text x="66" y="46" class="body" font-size="22" font-weight="600" fill="#14161A">Политика</text>
    <text x="22" y="86" class="body" font-size="17" fill="#5A5E66">privacy-страница на сайте</text>
  </g>
  <g transform="translate(790,130)">
    <rect x="0" y="0" width="330" height="120" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="22" y="46" class="disp" font-size="34" fill="#2440C8">3</text>
    <text x="66" y="46" class="body" font-size="22" font-weight="600" fill="#14161A">Cookie-баннер</text>
    <text x="22" y="86" class="body" font-size="17" fill="#5A5E66">«Отклонить» = «Принять»</text>
  </g>
  <g transform="translate(80,275)">
    <rect x="0" y="0" width="330" height="120" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="22" y="46" class="disp" font-size="34" fill="#2440C8">4</text>
    <text x="66" y="46" class="body" font-size="22" font-weight="600" fill="#14161A">Согласие</text>
    <text x="22" y="86" class="body" font-size="17" fill="#5A5E66">галочка в каждой форме</text>
  </g>
  <g transform="translate(435,275)">
    <rect x="0" y="0" width="330" height="120" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="22" y="46" class="disp" font-size="34" fill="#2440C8">5</text>
    <text x="66" y="46" class="body" font-size="22" font-weight="600" fill="#14161A">Данные в ЕС</text>
    <text x="22" y="86" class="body" font-size="17" fill="#5A5E66">хостинг и сервисы в ЕС</text>
  </g>
  <g transform="translate(790,275)">
    <rect x="0" y="0" width="330" height="120" fill="#2440C8"/>
    <text x="22" y="46" class="disp" font-size="34" fill="#FFFFFF">6</text>
    <text x="66" y="46" class="body" font-size="22" font-weight="600" fill="#FFFFFF">Права людей</text>
    <text x="22" y="86" class="body" font-size="17" fill="#C9D2FF">удалить · выгрузить данные</text>
  </g>
  <text x="80" y="470" class="mono" font-size="15" fill="#5A5E66">Источник: Регламент ЕС 2016/679 (GDPR) · руководство EDPB для малого бизнеса</text>
</svg>
