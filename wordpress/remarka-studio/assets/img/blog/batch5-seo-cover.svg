  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — БЛОГ</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">SEO · ИТАЛИЯ 2026</text>
  <text x="80" y="252" class="disp" font-size="70" letter-spacing="1" fill="#14161A">SEO В ИТАЛИИ</text>
