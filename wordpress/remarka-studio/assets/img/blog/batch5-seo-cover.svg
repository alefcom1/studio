    <text x="24" y="74" class="disp" font-size="30" fill="#14161A">заголовки · ссылки · скорость</text>
  </g>
  <g transform="translate(760,150)">
    <rect x="0" y="0" width="360" height="52" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <circle cx="28" cy="26" r="8" fill="#2440C8"/>
