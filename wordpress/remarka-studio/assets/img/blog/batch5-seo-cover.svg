    <rect x="0" y="120" width="360" height="44" fill="#FFFFFF" stroke="#EBEAE4" stroke-width="1"/>
    <text x="20" y="148" class="body" font-size="17" fill="#5A5E66">конкурент</text>
    <rect x="0" y="196" width="360" height="88" fill="#14161A"/>
    <text x="24" y="230" class="mono" font-size="13" letter-spacing="2" fill="#C9D2FF">ОТЧЁТ КАЖДЫЙ МЕСЯЦ</text>
