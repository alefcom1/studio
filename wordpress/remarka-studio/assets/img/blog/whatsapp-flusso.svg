<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Modulo di contatto contro WhatsApp: due percorsi dalla visita alla richiesta">
  <defs>
    <pattern id="gridWfl" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="520" fill="#F7F6F2"/>
  <rect width="1200" height="520" fill="url(#gridWfl)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">DUE PERCORSI DALLA VISITA ALLA RICHIESTA</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <!-- row 1: modulo -->
  <text x="80" y="140" class="mono" font-size="15" fill="#5A5E66">MODULO</text>
  <g class="body" font-size="15" fill="#14161A">
    <g transform="translate(80,158)"><rect width="180" height="60" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/><text x="18" y="36" font-size="16">Compila 8 campi</text></g>
    <g transform="translate(320,158)"><rect width="150" height="60" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/><text x="18" y="36" font-size="16">Invia</text></g>
    <g transform="translate(530,158)"><rect width="180" height="60" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/><text x="18" y="36" font-size="16">Aspetta (ore?)</text></g>
    <g transform="translate(770,158)"><rect width="230" height="60" fill="#DDDBD4"/><text x="18" y="36" font-size="16" fill="#5A5E66">Forse una risposta</text></g>
  </g>
  <text x="272" y="196" class="mono" font-size="26" fill="#9AA0AA">→</text>
  <text x="482" y="196" class="mono" font-size="26" fill="#9AA0AA">→</text>
  <text x="722" y="196" class="mono" font-size="26" fill="#9AA0AA">→</text>
  <!-- row 2: chat -->
  <text x="80" y="300" class="mono" font-size="15" fill="#2440C8">CHAT (WHATSAPP)</text>
  <g class="body" font-size="15" fill="#FFFFFF">
    <g transform="translate(80,318)"><rect width="180" height="60" fill="#2440C8"/><text x="18" y="36" font-size="16">Scrivi una riga</text></g>
    <g transform="translate(320,318)"><rect width="150" height="60" fill="#2440C8"/><text x="18" y="36" font-size="16">Dialoghi</text></g>
    <g transform="translate(530,318)"><rect width="180" height="60" fill="#2440C8"/><text x="18" y="36" font-size="16">Ricevi subito</text></g>
    <g transform="translate(770,318)"><rect width="230" height="60" fill="#14161A"/><text x="18" y="36" font-size="16">Contatto avviato</text></g>
  </g>
  <text x="272" y="356" class="mono" font-size="26" fill="#5B73E8">→</text>
  <text x="482" y="356" class="mono" font-size="26" fill="#5B73E8">→</text>
  <text x="722" y="356" class="mono" font-size="26" fill="#5B73E8">→</text>
  <g transform="translate(80,420)">
    <rect x="0" y="0" width="920" height="46" fill="#EEF1FE" stroke="#2440C8" stroke-width="1"/>
    <text x="18" y="29" class="mono" font-size="15" fill="#2440C8">Non l’uno contro l’altro: affiancare WhatsApp al modulo intercetta chi preferisce scrivere.</text>
  </g>
</svg>
