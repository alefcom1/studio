<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Monitoraggio del sito web dopo il lancio">
  <defs>
    <pattern id="gridMo" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}</style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridMo)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">MONITORAGGIO</text>
  <text x="80" y="230" class="disp" font-size="76" letter-spacing="1" fill="#14161A">MONITORAGGIO</text>
  <text x="84" y="292" class="body" font-size="31" font-weight="600" fill="#14161A">cosa misurare ogni mese, dopo il lancio</text>
  <text x="84" y="336" class="mono" font-size="19" fill="#5A5E66">i siti non si rompono con un boato: si logorano in silenzio</text>
  <!-- 12-month score line -->
  <g transform="translate(80,400)">
    <rect x="0" y="0" width="640" height="190" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="20" y="34" class="mono" font-size="13" letter-spacing="2" fill="#5A5E66">PAGESPEED · 12 MESI</text>
    <line x1="20" y1="60" x2="620" y2="60" stroke="#EBEAE4" stroke-width="1"/>
    <line x1="20" y1="105" x2="620" y2="105" stroke="#EBEAE4" stroke-width="1"/>
    <line x1="20" y1="150" x2="620" y2="150" stroke="#EBEAE4" stroke-width="1"/>
    <text x="626" y="64" class="mono" font-size="11" fill="#9AA0AA">90</text>
    <text x="626" y="109" class="mono" font-size="11" fill="#9AA0AA">70</text>
    <text x="626" y="154" class="mono" font-size="11" fill="#9AA0AA">50</text>
    <!-- degradation without watch (grey dashed) -->
    <polyline points="30,58 130,64 230,80 330,96 430,118 530,140 610,158" fill="none" stroke="#9AA0AA" stroke-width="2.5" stroke-dasharray="7 6"/>
    <!-- watched line (blue, corrected) -->
    <polyline points="30,58 130,62 230,74 280,58 380,66 480,78 520,56 610,60" fill="none" stroke="#2440C8" stroke-width="3"/>
    <circle cx="280" cy="58" r="5" fill="#2440C8"/>
    <circle cx="520" cy="56" r="5" fill="#2440C8"/>
    <text x="30" y="182" class="mono" font-size="11" fill="#9AA0AA">M1</text>
    <text x="596" y="182" class="mono" font-size="11" fill="#9AA0AA">M12</text>
  </g>
  <!-- dark thresholds card -->
  <g transform="translate(760,400)">
    <rect x="0" y="0" width="360" height="190" fill="#14161A"/>
    <text x="26" y="40" class="mono" font-size="14" fill="#9AA0AA">CORE WEB VITALS · SOGLIE</text>
    <text x="26" y="86" class="mono" font-size="20" fill="#F7F6F2">LCP &lt; 2,5 s</text>
    <text x="26" y="124" class="mono" font-size="20" fill="#F7F6F2">INP &lt; 200 ms</text>
    <text x="26" y="162" class="mono" font-size="20" fill="#F7F6F2">CLS &lt; 0,1</text>
    <text x="334" y="86" class="mono" font-size="14" fill="#1E7F4F" text-anchor="end">✓</text>
    <text x="334" y="124" class="mono" font-size="14" fill="#1E7F4F" text-anchor="end">✓</text>
    <text x="334" y="162" class="mono" font-size="14" fill="#1E7F4F" text-anchor="end">✓</text>
  </g>
</svg>
