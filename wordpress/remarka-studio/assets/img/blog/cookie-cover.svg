<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Cookie banner a norma">
  <defs>
    <pattern id="gridKc" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridKc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">GARANTE PRIVACY · 2026</text>
  <text x="80" y="264" class="disp" font-size="128" letter-spacing="1" fill="#14161A">COOKIE</text>
  <text x="84" y="324" class="body" font-size="34" font-weight="600" fill="#14161A">banner a norma · checklist</text>
  <text x="84" y="368" class="mono" font-size="20" fill="#5A5E66">rifiuta = accetta · consenso documentabile</text>
  <!-- bottom metric boxes -->
  <g transform="translate(80,430)">
    <rect x="0" y="0" width="230" height="92" fill="none" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="37" class="mono" font-size="14" letter-spacing="2" fill="#5A5E66">CHECKLIST</text>
    <text x="24" y="76" class="disp" font-size="46" fill="#14161A">6</text>
  </g>
  <!-- banner mockup right: two equal-weight buttons -->
  <g transform="translate(720,150)">
    <rect x="0" y="0" width="400" height="230" rx="14" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <rect x="28" y="34" width="240" height="15" rx="7" fill="#EBEAE4"/>
    <rect x="28" y="62" width="320" height="15" rx="7" fill="#EBEAE4"/>
    <rect x="28" y="90" width="180" height="15" rx="7" fill="#EBEAE4"/>
    <g transform="translate(28,140)">
      <rect x="0" y="0" width="160" height="56" rx="8" fill="none" stroke="#14161A" stroke-width="1.5"/>
      <text x="80" y="36" class="body" font-size="20" font-weight="600" fill="#14161A" text-anchor="middle">Rifiuta</text>
    </g>
    <g transform="translate(212,140)">
      <rect x="0" y="0" width="160" height="56" rx="8" fill="#2440C8"/>
      <text x="80" y="36" class="body" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">Accetta</text>
    </g>
    <text x="200" y="222" class="mono" font-size="13" fill="#5A5E66" text-anchor="middle">stesso peso / equal weight</text>
  </g>
</svg>
