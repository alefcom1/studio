<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="Le sette cause di un sito lento e il costo dell'intervento">
  <defs>
    <pattern id="gridL7" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="600" fill="#F7F6F2"/>
  <rect width="1200" height="600" fill="url(#gridL7)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">SITO LENTO — 7 CAUSE / CAUSES</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <!-- legend: cost of fix -->
  <g class="mono" font-size="14" transform="translate(700,66)">
    <text x="-20" y="0" fill="#5A5E66" text-anchor="end">COSTO INTERVENTO / FIX COST:</text>
    <rect x="0" y="-12" width="14" height="14" fill="#1E7F4F"/><text x="22" y="0" fill="#14161A">basso</text>
    <rect x="110" y="-12" width="14" height="14" fill="#c98a00"/><text x="132" y="0" fill="#14161A">medio</text>
    <rect x="230" y="-12" width="14" height="14" fill="#cc3333"/><text x="252" y="0" fill="#14161A">alto</text>
  </g>
  <g class="body" font-size="21">
    <g transform="translate(80,104)"><rect width="1040" height="58" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1"/><text x="28" y="37" class="mono" font-size="20" fill="#2440C8">1</text><text x="70" y="37" fill="#14161A">Immagini non ottimizzate (3–8 MB)</text><rect x="900" y="16" width="120" height="26" fill="#1E7F4F"/><text x="960" y="35" class="mono" font-size="14" fill="#FFFFFF" text-anchor="middle">basso</text></g>
    <g transform="translate(80,170)"><rect width="1040" height="58" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1"/><text x="28" y="37" class="mono" font-size="20" fill="#2440C8">2</text><text x="70" y="37" fill="#14161A">Hosting inadeguato · server sovraffollati</text><rect x="900" y="16" width="120" height="26" fill="#1E7F4F"/><text x="960" y="35" class="mono" font-size="14" fill="#FFFFFF" text-anchor="middle">basso</text></g>
    <g transform="translate(80,236)"><rect width="1040" height="58" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1"/><text x="28" y="37" class="mono" font-size="20" fill="#2440C8">3</text><text x="70" y="37" fill="#14161A">Tema o template sovraccarico</text><rect x="900" y="16" width="120" height="26" fill="#c98a00"/><text x="960" y="35" class="mono" font-size="14" fill="#FFFFFF" text-anchor="middle">medio</text></g>
    <g transform="translate(80,302)"><rect width="1040" height="58" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1"/><text x="28" y="37" class="mono" font-size="20" fill="#2440C8">4</text><text x="70" y="37" fill="#14161A">Plugin accumulati negli anni (fino a 60)</text><rect x="900" y="16" width="120" height="26" fill="#1E7F4F"/><text x="960" y="35" class="mono" font-size="14" fill="#FFFFFF" text-anchor="middle">basso</text></g>
    <g transform="translate(80,368)"><rect width="1040" height="58" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1"/><text x="28" y="37" class="mono" font-size="20" fill="#2440C8">5</text><text x="70" y="37" fill="#14161A">Font e script esterni che bloccano</text><rect x="900" y="16" width="120" height="26" fill="#1E7F4F"/><text x="960" y="35" class="mono" font-size="14" fill="#FFFFFF" text-anchor="middle">basso</text></g>
    <g transform="translate(80,434)"><rect width="1040" height="58" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1"/><text x="28" y="37" class="mono" font-size="20" fill="#2440C8">6</text><text x="70" y="37" fill="#14161A">Nessuna cache configurata</text><rect x="900" y="16" width="120" height="26" fill="#1E7F4F"/><text x="960" y="35" class="mono" font-size="14" fill="#FFFFFF" text-anchor="middle">basso</text></g>
    <g transform="translate(80,500)"><rect width="1040" height="58" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1"/><text x="28" y="37" class="mono" font-size="20" fill="#2440C8">7</text><text x="70" y="37" fill="#14161A">Base tecnica vecchia · PHP obsoleto</text><rect x="900" y="16" width="120" height="26" fill="#cc3333"/><text x="960" y="35" class="mono" font-size="14" fill="#FFFFFF" text-anchor="middle">alto</text></g>
  </g>
</svg>
