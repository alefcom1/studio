<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Il testo prima del design: dal messaggio alla pagina, l'ordine giusto di un progetto web">
  <defs>
    <pattern id="gridCor" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="520" fill="#F7F6F2"/>
  <rect width="1200" height="520" fill="url(#gridCor)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">L’ORDINE CHE CONVERTE — E QUELLO CHE NO</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <!-- right order -->
  <text x="80" y="130" class="mono" font-size="15" fill="#2440C8">✓ L’ORDINE GIUSTO</text>
  <g class="body" font-size="16" fill="#FFFFFF">
    <g transform="translate(80,148)"><rect width="230" height="66" fill="#2440C8"/><text x="20" y="30" font-size="15" fill="#C9D2FF" class="mono">MESSAGGIO</text><text x="20" y="52">Cosa dire, a chi, quale CTA</text></g>
    <g transform="translate(400,148)"><rect width="230" height="66" fill="#5B73E8"/><text x="20" y="30" font-size="15" fill="#EEF1FE" class="mono">DESIGN</text><text x="20" y="52">Dà forma al messaggio</text></g>
    <g transform="translate(720,148)"><rect width="230" height="66" fill="#14161A"/><text x="20" y="30" font-size="15" fill="#9AA0AA" class="mono">SITO</text><text x="20" y="52">Dice qualcosa · converte</text></g>
  </g>
  <text x="322" y="188" class="mono" font-size="26" fill="#9AA0AA">→</text>
  <text x="642" y="188" class="mono" font-size="26" fill="#9AA0AA">→</text>
  <!-- wrong order -->
  <text x="80" y="290" class="mono" font-size="15" fill="#5A5E66">✗ L’ORDINE SBAGLIATO</text>
  <g class="body" font-size="16" fill="#14161A">
    <g transform="translate(80,308)"><rect width="230" height="66" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/><text x="20" y="30" font-size="15" fill="#5A5E66" class="mono">GRAFICA</text><text x="20" y="52">Template e colori prima</text></g>
    <g transform="translate(400,308)"><rect width="230" height="66" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/><text x="20" y="30" font-size="15" fill="#5A5E66" class="mono">TESTI «DOPO»</text><text x="20" y="52">Riempiti di corsa</text></g>
    <g transform="translate(720,308)"><rect width="230" height="66" fill="#DDDBD4"/><text x="20" y="30" font-size="15" fill="#5A5E66" class="mono">SITO</text><text x="20" y="52">Bello, ma non dice niente</text></g>
  </g>
  <text x="322" y="348" class="mono" font-size="26" fill="#9AA0AA">→</text>
  <text x="642" y="348" class="mono" font-size="26" fill="#9AA0AA">→</text>
  <g transform="translate(80,418)">
    <rect x="0" y="0" width="870" height="46" fill="#EEF1FE" stroke="#2440C8" stroke-width="1"/>
    <text x="18" y="29" class="mono" font-size="15" fill="#2440C8">Sul web si screma, non si legge: il testo va deciso prima, il design gli dà forma.</text>
  </g>
</svg>
