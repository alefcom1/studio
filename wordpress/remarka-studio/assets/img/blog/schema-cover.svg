<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Dati strutturati schema.org">
  <defs>
    <pattern id="gridSc" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}</style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridSc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">SCHEMA.ORG · JSON-LD</text>
  <text x="80" y="248" class="disp" font-size="82" letter-spacing="1" fill="#14161A">DATI STRUTTURATI</text>
  <text x="84" y="308" class="body" font-size="34" font-weight="600" fill="#14161A">il vostro sito, in una lingua che Google capisce</text>
  <text x="84" y="352" class="mono" font-size="20" fill="#5A5E66">prezzi · orari · recensioni → risultati ricchi</text>
  <!-- code block -> rich result -->
  <g transform="translate(80,400)">
    <rect x="0" y="0" width="440" height="168" fill="#14161A"/>
    <text x="20" y="34" class="mono" font-size="14" fill="#5B73E8">&lt;script type="application/ld+json"&gt;</text>
    <g class="mono" font-size="14" fill="#F7F6F2"><text x="20" y="66">  "@type": "LocalBusiness",</text><text x="20" y="94">  "name": "…", "openingHours": "…",</text><text x="20" y="122">  "priceRange": "…", "review": [ … ]</text></g>
    <text x="20" y="150" class="mono" font-size="14" fill="#5B73E8">&lt;/script&gt;</text>
  </g>
  <g transform="translate(560,436)"><line x1="0" y1="0" x2="70" y2="0" stroke="#2440C8" stroke-width="3"/><path d="M70 -9 L90 0 L70 9 Z" fill="#2440C8"/></g>
  <g transform="translate(680,400)">
    <rect x="0" y="0" width="440" height="168" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="20" y="38" class="body" font-size="20" fill="#2440C8">La Vostra Attività</text>
    <text x="20" y="70" class="mono" font-size="14" fill="#E0A21A">★★★★★</text>
    <text x="150" y="70" class="mono" font-size="13" fill="#5A5E66">4,8 · 126 recensioni</text>
    <text x="20" y="104" class="mono" font-size="13" fill="#14161A">Aperto ora · chiude alle 19:00</text>
    <text x="20" y="134" class="mono" font-size="13" fill="#14161A">€€ · Milano</text>
  </g>
</svg>
