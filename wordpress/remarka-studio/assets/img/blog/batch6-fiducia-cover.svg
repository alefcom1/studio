<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Come verificare un'agenzia web: segnali di fiducia">
  <defs>
    <pattern id="gridFid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridFid)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — БЛОГ</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">ВЫБОР ПОДРЯДЧИКА · 2026</text>
  <text x="80" y="238" class="disp" font-size="70" letter-spacing="1" fill="#14161A">8 СИГНАЛОВ ДОВЕРИЯ</text>
  <text x="84" y="302" class="body" font-size="34" font-weight="600" fill="#14161A">как проверить веб-студию до договора</text>
  <text x="84" y="346" class="mono" font-size="20" fill="#5A5E66">не по обложке, а по фактам, которые дорого подделать</text>
  <g transform="translate(80,428)">
    <rect x="0" y="0" width="260" height="88" fill="#2440C8"/>
    <text x="24" y="34" class="mono" font-size="13" letter-spacing="2" fill="#C9D2FF">ПРОВЕРКА</text>
    <text x="24" y="72" class="disp" font-size="30" fill="#FFFFFF">за 5 минут</text>
  </g>
  <g transform="translate(360,428)">
    <rect x="0" y="0" width="260" height="88" fill="none" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="34" class="mono" font-size="13" letter-spacing="2" fill="#5A5E66">КРАСНЫЙ ФЛАГ</text>
    <text x="24" y="72" class="disp" font-size="30" fill="#14161A">3 из 8 мимо</text>
  </g>
  <g transform="translate(880,150)">
    <rect x="0" y="0" width="240" height="240" fill="none" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="20" y="46" class="mono" font-size="15" fill="#5A5E66">СМОТРИМ НА</text>
    <text x="20" y="96" class="body" font-size="21" fill="#14161A">портфолио</text>
    <text x="20" y="140" class="body" font-size="21" fill="#14161A">скорость</text>
    <text x="20" y="184" class="body" font-size="21" fill="#14161A">договор</text>
    <text x="20" y="228" class="body" font-size="21" fill="#2440C8">гарантии</text>
  </g>
</svg>
