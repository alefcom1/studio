<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Il test delle cinque domande: restyling o sito nuovo">
  <defs>
    <pattern id="gridR5d" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="500" fill="#F7F6F2"/>
  <rect width="1200" height="500" fill="url(#gridR5d)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">IL TEST DELLE 5 DOMANDE — DOVE PORTANO</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <text x="880" y="112" class="mono" font-size="13" fill="#2440C8" text-anchor="middle">RESTYLING</text>
  <text x="1060" y="112" class="mono" font-size="13" fill="#14161A" text-anchor="middle">SITO NUOVO</text>
  <g class="body" font-size="17" fill="#14161A">
    <g transform="translate(80,132)">
      <text x="0" y="26" class="mono" font-size="15" fill="#5A5E66">01</text>
      <text x="44" y="26">Lento su telefono anche dopo aver alleggerito le immagini?</text>
      <circle cx="880" cy="20" r="7" fill="#DDDBD4"/><circle cx="1060" cy="20" r="7" fill="#2440C8"/>
    </g>
    <g transform="translate(80,178)">
      <text x="0" y="26" class="mono" font-size="15" fill="#5A5E66">02</text>
      <text x="44" y="26">Ogni modifica è una battaglia da tecnico?</text>
      <circle cx="880" cy="20" r="7" fill="#DDDBD4"/><circle cx="1060" cy="20" r="7" fill="#2440C8"/>
    </g>
    <g transform="translate(80,224)">
      <text x="0" y="26" class="mono" font-size="15" fill="#5A5E66">03</text>
      <text x="44" y="26">Inutilizzabile o inaccessibile da mobile?</text>
      <circle cx="880" cy="20" r="7" fill="#DDDBD4"/><circle cx="1060" cy="20" r="7" fill="#2440C8"/>
    </g>
    <g transform="translate(80,270)">
      <text x="0" y="26" class="mono" font-size="15" fill="#5A5E66">04</text>
      <text x="44" y="26">Piattaforma ferma, insicura, non aggiornabile?</text>
      <circle cx="880" cy="20" r="7" fill="#DDDBD4"/><circle cx="1060" cy="20" r="7" fill="#2440C8"/>
    </g>
    <g transform="translate(80,316)">
      <text x="0" y="26" class="mono" font-size="15" fill="#5A5E66">05</text>
      <text x="44" y="26">Il sito non dice più cosa siete diventati?</text>
      <circle cx="880" cy="20" r="7" fill="#2440C8"/><circle cx="1060" cy="20" r="7" fill="#DDDBD4"/>
    </g>
  </g>
  <g transform="translate(80,372)">
    <rect x="0" y="0" width="1000" height="46" fill="#EEF1FE" stroke="#2440C8" stroke-width="1"/>
    <text x="18" y="29" class="mono" font-size="15" fill="#2440C8">La soglia non è matematica: conta QUALI domande. Fondamenta = sito nuovo · aspetto = restyling.</text>
  </g>
</svg>
