<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-label="Anatomia di un blocco JSON-LD schema.org">
  <defs>
    <pattern id="gridSj" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}</style>
  </defs>
  <rect width="1200" height="470" fill="#F7F6F2"/>
  <rect width="1200" height="470" fill="url(#gridSj)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">ANATOMIA DI UN BLOCCO JSON-LD</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <g transform="translate(80,110)">
    <rect x="0" y="0" width="640" height="300" fill="#14161A"/>
    <rect x="0" y="0" width="640" height="8" fill="#2440C8"/>
    <g class="mono" font-size="16">
      <text x="26" y="52" fill="#5B73E8">"@type"</text><text x="200" y="52" fill="#F7F6F2">: "LocalBusiness"</text>
      <text x="26" y="92" fill="#5B73E8">"name"</text><text x="200" y="92" fill="#F7F6F2">: "La Vostra Attività"</text>
      <text x="26" y="132" fill="#5B73E8">"address"</text><text x="200" y="132" fill="#F7F6F2">: "Via …, Milano"</text>
      <text x="26" y="172" fill="#5B73E8">"openingHours"</text><text x="260" y="172" fill="#F7F6F2">: "Mo-Sa 09-19"</text>
      <text x="26" y="212" fill="#5B73E8">"priceRange"</text><text x="240" y="212" fill="#F7F6F2">: "€€"</text>
      <text x="26" y="252" fill="#5B73E8">"aggregateRating"</text><text x="300" y="252" fill="#F7F6F2">: 4.8</text>
    </g>
  </g>
  <g transform="translate(740,110)">
    <text x="0" y="20" class="mono" font-size="14" fill="#5A5E66">GOOGLE LEGGE E MOSTRA</text>
    <g class="mono" font-size="16" fill="#14161A">
      <text x="0" y="70">→ nome e categoria</text>
      <text x="0" y="118">→ indirizzo e mappa</text>
      <text x="0" y="166">→ orari «aperto ora»</text>
      <text x="0" y="214">→ fascia di prezzo</text>
      <text x="0" y="262">→ stelline recensioni</text>
    </g>
    <text x="0" y="300" class="mono" font-size="13" fill="#2440C8">= risultato ricco</text>
  </g>
</svg>
