<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Google Analytics 4 e GDPR: il vostro sito è davvero a norma sulla privacy in UE">
  <defs>
    <pattern id="gridGa4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridGa4)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">GA4 · GDPR</text>
  <text x="80" y="238" class="disp" font-size="90" letter-spacing="1" fill="#14161A">GA4 e privacy:</text>
  <text x="80" y="326" class="disp" font-size="90" letter-spacing="1" fill="#14161A">siete a norma?</text>
  <text x="84" y="388" class="mono" font-size="20" fill="#5A5E66">google analytics 4 e gdpr — la domanda che la migrazione non ha chiuso</text>
  <g transform="translate(80,448)">
    <rect x="0" y="0" width="470" height="118" fill="#2440C8"/>
    <text x="26" y="42" class="mono" font-size="14" letter-spacing="2" fill="#C9D2FF">INSTALLARE GA4</text>
    <text x="26" y="92" class="disp" font-size="40" fill="#FFFFFF">non basta</text>
  </g>
  <text x="576" y="522" class="mono" font-size="30" fill="#9AA0AA">≠</text>
  <g transform="translate(628,448)">
    <rect x="0" y="0" width="470" height="118" fill="#14161A"/>
    <text x="26" y="42" class="mono" font-size="14" letter-spacing="2" fill="#9AA0AA">CONSENSO + CONFIGURAZIONE</text>
    <text x="26" y="92" class="disp" font-size="40" fill="#FFFFFF">essere a norma</text>
  </g>
</svg>
