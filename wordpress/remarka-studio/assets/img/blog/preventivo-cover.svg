<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Preventivo sito web: come leggerlo senza sorprese">
  <defs>
    <pattern id="gridPvc" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridPvc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">PREVENTIVO SITO WEB · 2026</text>
  <text x="80" y="238" class="disp" font-size="96" letter-spacing="1" fill="#14161A">Lo stesso sito,</text>
  <text x="80" y="330" class="disp" font-size="96" letter-spacing="1" fill="#14161A">tre preventivi.</text>
  <text x="84" y="392" class="mono" font-size="20" fill="#5A5E66">come leggerli riga per riga · niente sorprese in fattura</text>
  <!-- three quotes -->
  <g transform="translate(80,448)">
    <rect x="0" y="0" width="300" height="110" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="24" y="40" class="mono" font-size="14" letter-spacing="2" fill="#5A5E66">PREVENTIVO A</text>
    <text x="24" y="88" class="disp" font-size="46" fill="#14161A">€ 2.400</text>
  </g>
  <g transform="translate(410,448)">
    <rect x="0" y="0" width="300" height="110" fill="#2440C8"/>
    <text x="24" y="40" class="mono" font-size="14" letter-spacing="2" fill="#C9D2FF">PREVENTIVO B</text>
    <text x="24" y="88" class="disp" font-size="46" fill="#FFFFFF">€ 6.900</text>
  </g>
  <g transform="translate(740,448)">
    <rect x="0" y="0" width="300" height="110" fill="#14161A"/>
    <text x="24" y="40" class="mono" font-size="14" letter-spacing="2" fill="#9AA0AA">PREVENTIVO C</text>
    <text x="24" y="88" class="disp" font-size="46" fill="#FFFFFF">€ 14.000</text>
  </g>
</svg>
