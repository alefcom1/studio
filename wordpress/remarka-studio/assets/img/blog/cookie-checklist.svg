<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Checklist del cookie banner a norma">
  <defs>
    <pattern id="gridKd" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="560" fill="#F7F6F2"/>
  <rect width="1200" height="560" fill="url(#gridKd)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">COOKIE BANNER — CHECKLIST · 6 PUNTI / POINTS</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <g class="body" font-size="21">
    <g transform="translate(80,104)"><rect width="1040" height="52" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1"/><circle cx="30" cy="26" r="13" fill="#1E7F4F"/><path d="M23 26 L28 31 L37 21" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="62" y="34" fill="#14161A">«Rifiuta» ha lo stesso peso di «Accetta»</text><text x="1020" y="34" class="mono" font-size="14" fill="#5A5E66" text-anchor="end">01</text></g>
    <g transform="translate(80,164)"><rect width="1040" height="52" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1"/><circle cx="30" cy="26" r="13" fill="#1E7F4F"/><path d="M23 26 L28 31 L37 21" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="62" y="34" fill="#14161A">Nessun tracker parte prima del consenso</text><text x="1020" y="34" class="mono" font-size="14" fill="#5A5E66" text-anchor="end">02</text></g>
    <g transform="translate(80,224)"><rect width="1040" height="52" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1"/><circle cx="30" cy="26" r="13" fill="#1E7F4F"/><path d="M23 26 L28 31 L37 21" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="62" y="34" fill="#14161A">Chiudere il banner (X) ≠ consenso</text><text x="1020" y="34" class="mono" font-size="14" fill="#5A5E66" text-anchor="end">03</text></g>
    <g transform="translate(80,284)"><rect width="1040" height="52" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1"/><circle cx="30" cy="26" r="13" fill="#1E7F4F"/><path d="M23 26 L28 31 L37 21" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="62" y="34" fill="#14161A">Link «preferenze cookie» sempre raggiungibile</text><text x="1020" y="34" class="mono" font-size="14" fill="#5A5E66" text-anchor="end">04</text></g>
    <g transform="translate(80,344)"><rect width="1040" height="52" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1"/><circle cx="30" cy="26" r="13" fill="#1E7F4F"/><path d="M23 26 L28 31 L37 21" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="62" y="34" fill="#14161A">Cookie policy chiara, con finalità elencate</text><text x="1020" y="34" class="mono" font-size="14" fill="#5A5E66" text-anchor="end">05</text></g>
    <g transform="translate(80,404)"><rect width="1040" height="52" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1"/><circle cx="30" cy="26" r="13" fill="#1E7F4F"/><path d="M23 26 L28 31 L37 21" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="62" y="34" fill="#14161A">Consenso registrato e documentabile nel tempo</text><text x="1020" y="34" class="mono" font-size="14" fill="#5A5E66" text-anchor="end">06</text></g>
  </g>
  <!-- common violations strip -->
  <g transform="translate(80,478)">
    <text x="0" y="16" class="mono" font-size="14" letter-spacing="2" fill="#5A5E66">ERRORI PIÙ COMUNI / MOST COMMON FAILS</text>
    <g class="mono" font-size="16">
      <g transform="translate(0,32)"><circle cx="10" cy="-5" r="8" fill="#cc3333"/><text x="30" y="0" fill="#14161A">solo «Accetta» visibile</text></g>
      <g transform="translate(320,32)"><circle cx="10" cy="-5" r="8" fill="#cc3333"/><text x="30" y="0" fill="#14161A">analytics al caricamento</text></g>
      <g transform="translate(660,32)"><circle cx="10" cy="-5" r="8" fill="#c98a00"/><text x="30" y="0" fill="#14161A">cookie wall «accetta o esci»</text></g>
    </g>
  </g>
</svg>
