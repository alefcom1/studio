<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-label="Dal peso della pagina ai grammi di CO2 per visita e alla stima annua">
  <defs>
    <pattern id="gridImp" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="480" fill="#F7F6F2"/>
  <rect width="1200" height="480" fill="url(#gridImp)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">DAL PESO AI GRAMMI — MODELLO SUSTAINABLE WEB DESIGN (co2.js)</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <!-- four steps -->
  <g transform="translate(80,120)">
    <rect x="0" y="0" width="230" height="150" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="20" y="42" class="mono" font-size="30" fill="#DDDBD4">1</text>
    <text x="20" y="86" class="body" font-size="20" fill="#14161A">Byte trasferiti</text>
    <text x="20" y="120" class="mono" font-size="14" fill="#5A5E66">immagini, script,</text>
    <text x="20" y="140" class="mono" font-size="14" fill="#5A5E66">font, video</text>
  </g>
  <g transform="translate(340,120)">
    <rect x="0" y="0" width="230" height="150" fill="#FFFFFF" stroke="#2440C8" stroke-width="1.5"/>
    <text x="20" y="42" class="mono" font-size="30" fill="#2440C8">2</text>
    <text x="20" y="86" class="body" font-size="20" fill="#14161A">Energia</text>
    <text x="20" y="120" class="mono" font-size="14" fill="#5A5E66">data center, rete,</text>
    <text x="20" y="140" class="mono" font-size="14" fill="#5A5E66">dispositivo</text>
  </g>
  <g transform="translate(600,120)">
    <rect x="0" y="0" width="230" height="150" fill="#EEF1FE" stroke="#2440C8" stroke-width="1.5"/>
    <text x="20" y="42" class="mono" font-size="30" fill="#2440C8">3</text>
    <text x="20" y="86" class="body" font-size="20" fill="#14161A">CO₂ / visita</text>
    <text x="20" y="120" class="mono" font-size="14" fill="#2440C8">media web</text>
    <text x="20" y="140" class="mono" font-size="14" fill="#2440C8">≈ 0,8 g</text>
  </g>
  <g transform="translate(860,120)">
    <rect x="0" y="0" width="260" height="150" fill="#14161A"/>
    <text x="20" y="42" class="mono" font-size="30" fill="#5B73E8">4</text>
    <text x="20" y="86" class="body" font-size="20" fill="#FFFFFF">Stima annua</text>
    <text x="20" y="120" class="mono" font-size="14" fill="#9AA0AA">× visite/mese</text>
    <text x="20" y="140" class="mono" font-size="14" fill="#9AA0AA">= kg CO₂ / anno</text>
  </g>
  <text x="322" y="205" class="body" font-size="26" fill="#2440C8">→</text>
  <text x="582" y="205" class="body" font-size="26" fill="#2440C8">→</text>
  <text x="842" y="205" class="body" font-size="26" fill="#2440C8">→</text>
  <g transform="translate(80,318)">
    <rect x="0" y="0" width="1040" height="46" fill="none" stroke="#2440C8" stroke-width="1"/>
    <text x="18" y="29" class="mono" font-size="15" fill="#2440C8">Meno byte = meno CO₂ E meno secondi di attesa: alleggerire e velocizzare sono la stessa leva.</text>
  </g>
  <text x="80" y="404" class="mono" font-size="13" fill="#5A5E66">Stima indicativa con coefficienti medi mondiali, non un'impronta certificata.</text>
</svg>
