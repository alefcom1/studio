<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="WhatsApp Business per le PMI: quando il contatto batte il modulo">
  <defs>
    <pattern id="gridWac" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridWac)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">WHATSAPP BUSINESS · PMI</text>
  <text x="80" y="232" class="disp" font-size="86" letter-spacing="1" fill="#14161A">A volte il cliente</text>
  <text x="80" y="318" class="disp" font-size="86" letter-spacing="1" fill="#14161A">non compila: scrive.</text>
  <text x="84" y="378" class="mono" font-size="20" fill="#5A5E66">quando un contatto via chat batte il modulo — e come restare a norma</text>
  <!-- chat bubbles -->
  <g transform="translate(80,432)">
    <rect x="0" y="0" width="420" height="52" rx="14" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="22" y="33" class="body" font-size="17" fill="#14161A">«Buongiorno, avete posto sabato sera?»</text>
    <rect x="120" y="70" width="300" height="52" rx="14" fill="#2440C8"/>
    <text x="142" y="103" class="body" font-size="17" fill="#FFFFFF">«Sì! Per quante persone?»</text>
  </g>
  <g transform="translate(700,432)">
    <rect x="0" y="0" width="420" height="122" fill="#14161A"/>
    <text x="24" y="42" class="mono" font-size="14" letter-spacing="2" fill="#9AA0AA">DIFFUSIONE</text>
    <text x="24" y="92" class="disp" font-size="50" fill="#FFFFFF">2+ miliardi</text>
    <text x="24" y="112" class="mono" font-size="13" fill="#C9D2FF">di utenti nel mondo</text>
  </g>
</svg>
