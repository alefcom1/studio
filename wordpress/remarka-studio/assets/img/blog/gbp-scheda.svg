<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Anatomia di un Google Business Profile">
  <defs>
    <pattern id="gridGs" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}</style>
  </defs>
  <rect width="1200" height="520" fill="#F7F6F2"/>
  <rect width="1200" height="520" fill="url(#gridGs)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">ANATOMIA DI UNA SCHEDA CURATA</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <!-- card -->
  <g transform="translate(80,116)">
    <rect x="0" y="0" width="520" height="356" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="28" y="52" class="body" font-size="26" fill="#2440C8">La Vostra Attività</text>
    <text x="28" y="88" class="mono" font-size="15" fill="#E0A21A">★★★★★</text>
    <text x="170" y="88" class="mono" font-size="14" fill="#5A5E66">4,8 · 126 recensioni</text>
    <line x1="28" y1="110" x2="492" y2="110" stroke="#EBEAE4" stroke-width="1"/>
    <text x="28" y="146" class="mono" font-size="15" fill="#14161A">Categoria · Idraulico</text>
    <text x="28" y="182" class="mono" font-size="15" fill="#14161A">Aperto ora · chiude alle 19:00</text>
    <text x="28" y="218" class="mono" font-size="15" fill="#14161A">Milano · via …, 2a · tel. …</text>
    <rect x="28" y="248" width="130" height="82" fill="#F7F6F2" stroke="#DDDBD4"/>
    <rect x="170" y="248" width="130" height="82" fill="#F7F6F2" stroke="#DDDBD4"/>
    <rect x="312" y="248" width="130" height="82" fill="#F7F6F2" stroke="#DDDBD4"/>
    <text x="28" y="346" class="mono" font-size="13" fill="#5A5E66">foto reali e recenti</text>
  </g>
  <!-- labels -->
  <g transform="translate(660,116)">
    <g><rect x="0" y="6" width="10" height="10" fill="#2440C8"/><text x="26" y="16" class="body" font-size="18" fill="#14161A">Categoria principale corretta</text></g>
    <g><rect x="0" y="72" width="10" height="10" fill="#2440C8"/><text x="26" y="82" class="body" font-size="18" fill="#14161A">Orari veri, festivi compresi</text></g>
    <g><rect x="0" y="138" width="10" height="10" fill="#2440C8"/><text x="26" y="148" class="body" font-size="18" fill="#14161A">Recensioni vere, con risposte</text></g>
    <g><rect x="0" y="204" width="10" height="10" fill="#2440C8"/><text x="26" y="214" class="body" font-size="18" fill="#14161A">Foto reali e recenti</text></g>
    <g><rect x="0" y="270" width="10" height="10" fill="#E0A21A"/><text x="26" y="280" class="body" font-size="18" fill="#14161A">NAP identico ovunque</text>
       <text x="26" y="306" class="mono" font-size="13" fill="#5A5E66">nome · indirizzo · telefono coerenti</text></g>
  </g>
</svg>
