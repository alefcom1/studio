<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="La regola del backup 3-2-1 per la sicurezza di un sito web">
  <defs>
    <pattern id="gridBr" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="500" fill="#F7F6F2"/>
  <rect width="1200" height="500" fill="url(#gridBr)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">LA REGOLA DEL BACKUP 3-2-1 — LA RETE DI SICUREZZA</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <g transform="translate(80,124)">
    <rect x="0" y="0" width="318" height="200" fill="#2440C8"/>
    <text x="28" y="96" class="disp" font-size="90" fill="#FFFFFF">3</text>
    <text x="28" y="140" class="body" font-size="21" fill="#FFFFFF">copie dei dati</text>
    <text x="28" y="172" class="mono" font-size="14" fill="#C9D2FF">l'originale + due backup</text>
  </g>
  <g transform="translate(430,124)">
    <rect x="0" y="0" width="318" height="200" fill="#5B73E8"/>
    <text x="28" y="96" class="disp" font-size="90" fill="#FFFFFF">2</text>
    <text x="28" y="140" class="body" font-size="21" fill="#FFFFFF">tipi di supporto</text>
    <text x="28" y="172" class="mono" font-size="14" fill="#EEF1FE">diversi, non tutto uguale</text>
  </g>
  <g transform="translate(780,124)">
    <rect x="0" y="0" width="318" height="200" fill="#14161A"/>
    <text x="28" y="96" class="disp" font-size="90" fill="#FFFFFF">1</text>
    <text x="28" y="140" class="body" font-size="21" fill="#FFFFFF">copia fuori sede</text>
    <text x="28" y="172" class="mono" font-size="14" fill="#9AA0AA">fuori dal server del sito</text>
  </g>
  <g transform="translate(80,360)">
    <rect x="0" y="0" width="1018" height="54" fill="#EEF1FE" stroke="#2440C8" stroke-width="1"/>
    <text x="20" y="33" class="mono" font-size="15" fill="#2440C8">Automatici, regolari e testati: un backup mai ripristinato non è un backup, è una speranza.</text>
  </g>
  <text x="80" y="456" class="body" font-size="15" fill="#5A5E66">GDPR art. 32: se raccogliete dati personali, misure di sicurezza adeguate non sono un extra — sono un obbligo.</text>
</svg>
