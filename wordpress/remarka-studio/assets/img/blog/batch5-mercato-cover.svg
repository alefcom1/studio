    <text x="24" y="34" class="mono" font-size="13" letter-spacing="2" fill="#5A5E66">ЛОКАЛИЗАЦИЯ</text>
    <text x="24" y="72" class="disp" font-size="34" fill="#14161A">носители</text>
  </g>
  <g transform="translate(560,430)">
