    <text x="20" y="46" class="mono" font-size="15" fill="#5A5E66">4 ШАГА</text>
    <text x="20" y="96" class="body" font-size="21" fill="#14161A">1 · домен .it</text>
    <text x="20" y="140" class="body" font-size="21" fill="#14161A">2 · тексты</text>
    <text x="20" y="184" class="body" font-size="21" fill="#14161A">3 · право ЕС</text>
    <text x="20" y="228" class="body" font-size="21" fill="#2440C8">4 · продвижение</text>
