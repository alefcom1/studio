<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="llms.txt">
  <defs>
    <pattern id="gridL" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridL)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">SEO · AI</text>
  <text x="80" y="272" class="mono" font-size="118" fill="#14161A">llms<tspan fill="#2440C8">.txt</tspan></text>
  <text x="84" y="330" class="disp" font-size="34" fill="#5A5E66">/llms.txt · root · Markdown</text>
  <!-- file card -->
  <g transform="translate(80,390)">
    <rect x="0" y="0" width="1040" height="180" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <rect x="0" y="0" width="1040" height="42" fill="#14161A"/>
    <circle cx="26" cy="21" r="6" fill="#5A5E66"/><circle cx="48" cy="21" r="6" fill="#5A5E66"/><circle cx="70" cy="21" r="6" fill="#5A5E66"/>
    <text x="100" y="27" class="mono" font-size="16" fill="#F7F6F2">/llms.txt</text>
    <text x="28" y="88" class="mono" font-size="22" fill="#2440C8"># </text>
    <rect x="52" y="72" width="300" height="20" rx="2" fill="#DDE1F5"/>
    <text x="28" y="122" class="mono" font-size="22" fill="#5A5E66">&gt; </text>
    <rect x="52" y="106" width="560" height="18" rx="2" fill="#EBEAE4"/>
    <text x="28" y="156" class="mono" font-size="22" fill="#14161A">## </text>
    <rect x="66" y="140" width="220" height="18" rx="2" fill="#EBEAE4"/>
    <text x="300" y="156" class="mono" font-size="20" fill="#2440C8">→ /…</text>
