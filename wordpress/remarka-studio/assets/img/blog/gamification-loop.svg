<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-label="Il ciclo della gamification">
  <defs>
    <pattern id="gridGal" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}</style>
  </defs>
  <rect width="1200" height="480" fill="#F7F6F2"/>
  <rect width="1200" height="480" fill="url(#gridGal)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">IL CICLO CHE COINVOLGE</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <!-- 4 boxes in a loop -->
  <g transform="translate(90,150)"><rect width="220" height="110" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/><rect width="220" height="8" fill="#2440C8"/><text x="24" y="48" class="mono" font-size="14" fill="#2440C8">1 · OBIETTIVO</text><text x="24" y="82" class="body" font-size="19" fill="#14161A">chiaro e visibile</text></g>
  <g transform="translate(400,150)"><rect width="220" height="110" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/><rect width="220" height="8" fill="#2440C8"/><text x="24" y="48" class="mono" font-size="14" fill="#2440C8">2 · AZIONE</text><text x="24" y="82" class="body" font-size="19" fill="#14161A">una piccola sfida</text></g>
  <g transform="translate(710,150)"><rect width="220" height="110" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/><rect width="220" height="8" fill="#2440C8"/><text x="24" y="48" class="mono" font-size="14" fill="#2440C8">3 · PROGRESSO</text><text x="24" y="82" class="body" font-size="19" fill="#14161A">si vede migliorare</text></g>
  <g transform="translate(1010,150)"><rect width="110" height="110" fill="#14161A"/><rect width="110" height="8" fill="#5B73E8"/><text x="16" y="48" class="mono" font-size="13" fill="#9AA0AA">4 · PREMIO</text><text x="16" y="80" class="body" font-size="16" fill="#FFFFFF">e si torna</text></g>
  <!-- arrows -->
  <g stroke="#2440C8" stroke-width="3" fill="#2440C8">
    <line x1="310" y1="205" x2="392" y2="205"/><path d="M392 196 L412 205 L392 214 Z"/>
    <line x1="620" y1="205" x2="702" y2="205"/><path d="M702 196 L722 205 L702 214 Z"/>
    <line x1="930" y1="205" x2="1002" y2="205"/><path d="M1002 196 L1022 205 L1002 214 Z"/>
  </g>
  <path d="M1065 260 L1065 330 L200 330 L200 262" fill="none" stroke="#9AA0AA" stroke-width="2" stroke-dasharray="6 6"/>
  <path d="M191 282 L200 262 L209 282 Z" fill="#9AA0AA"/>
  <text x="600" y="392" class="mono" font-size="15" fill="#5A5E66" text-anchor="middle">sui tre bisogni: autonomia · competenza · relazione</text>
</svg>
