<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Check-up del sito web">
  <defs>
    <pattern id="gridC" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridC)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">7 → 1</text>
  <text x="80" y="270" class="disp" font-size="118" letter-spacing="1" fill="#14161A">CHECK-UP</text>
  <text x="84" y="330" class="body" font-size="34" font-weight="600" fill="#14161A">7 misure · 1 punteggio</text>
  <text x="84" y="374" class="mono" font-size="20" fill="#5A5E66">7 metrics · 1 score · 0–100</text>
  <g transform="translate(80,430)">
    <rect x="0" y="0" width="150" height="92" fill="none" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="37" class="mono" font-size="14" fill="#5A5E66">TOOLS</text>
    <text x="24" y="76" class="disp" font-size="44" fill="#14161A">7</text>
  </g>
  <g transform="translate(250,430)">
    <rect x="0" y="0" width="150" height="92" fill="#2440C8"/>
    <text x="24" y="37" class="mono" font-size="14" fill="#C9D2FF">API</text>
    <text x="24" y="74" class="body" font-size="26" font-weight="600" fill="#FFFFFF">Google</text>
  </g>
  <!-- score dial -->
  <g transform="translate(900,320)">
    <circle r="150" fill="none" stroke="#EBEAE4" stroke-width="26"/>
    <circle r="150" fill="none" stroke="#1E7F4F" stroke-width="26" stroke-linecap="round"
      stroke-dasharray="866.6 942.5" transform="rotate(-90)"/>
    <text x="0" y="18" class="disp" font-size="96" fill="#14161A" text-anchor="middle">92</text>
    <text x="0" y="66" class="mono" font-size="18" fill="#5A5E66" text-anchor="middle">SALUTE / HEALTH</text>
  </g>
</svg>
