<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-label="Come Google valuta una pagina indipendentemente dalla lingua">
  <defs>
    <pattern id="gridSeoF" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="480" fill="#F7F6F2"/>
  <rect width="1200" height="480" fill="url(#gridSeoF)"/>
  <line x1="80" y1="86" x2="1120" y2="86" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="72" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">ЧТО GOOGLE ОЦЕНИВАЕТ НА СТРАНИЦЕ — БЕЗ ЗНАНИЯ ВАШЕГО ЯЗЫКА</text>
  <g transform="translate(80,140)">
    <rect x="0" y="0" width="300" height="130" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="48" class="body" font-size="24" font-weight="600" fill="#14161A">Структура</text>
    <text x="24" y="84" class="body" font-size="18" fill="#5A5E66">заголовки H1–H2,</text>
    <text x="24" y="110" class="body" font-size="18" fill="#5A5E66">hreflang, разметка</text>
  </g>
  <g transform="translate(80,300)">
    <rect x="0" y="0" width="300" height="130" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="48" class="body" font-size="24" font-weight="600" fill="#14161A">Скорость</text>
    <text x="24" y="84" class="body" font-size="18" fill="#5A5E66">быстрая загрузка</text>
    <text x="24" y="110" class="body" font-size="18" fill="#5A5E66">на мобильных</text>
  </g>
  <g transform="translate(450,140)">
    <rect x="0" y="0" width="300" height="130" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="48" class="body" font-size="24" font-weight="600" fill="#14161A">Ссылки</text>
    <text x="24" y="84" class="body" font-size="18" fill="#5A5E66">кто ссылается</text>
    <text x="24" y="110" class="body" font-size="18" fill="#5A5E66">на ваш сайт</text>
  </g>
  <g transform="translate(450,300)">
    <rect x="0" y="0" width="300" height="130" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="48" class="body" font-size="24" font-weight="600" fill="#14161A">Польза</text>
    <text x="24" y="84" class="body" font-size="18" fill="#5A5E66">отвечает ли текст</text>
    <text x="24" y="110" class="body" font-size="18" fill="#5A5E66">на вопрос человека</text>
  </g>
  <line x1="750" y1="205" x2="840" y2="240" stroke="#2440C8" stroke-width="2"/>
  <line x1="750" y1="365" x2="840" y2="290" stroke="#2440C8" stroke-width="2"/>
  <g transform="translate(840,175)">
    <rect x="0" y="0" width="280" height="130" fill="#2440C8"/>
    <text x="24" y="52" class="disp" font-size="30" fill="#FFFFFF">1 место</text>
    <text x="24" y="92" class="body" font-size="18" fill="#C9D2FF">в Google.it по вашему</text>
    <text x="24" y="116" class="body" font-size="18" fill="#C9D2FF">запросу</text>
  </g>
</svg>
