<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="Способы приёма оплаты на сайте и что учесть">
  <defs>
    <pattern id="gridOpS" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="600" fill="#F7F6F2"/>
  <rect width="1200" height="600" fill="url(#gridOpS)"/>
  <line x1="80" y1="86" x2="1120" y2="86" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="72" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">СПОСОБЫ ОПЛАТЫ НА САЙТЕ — И ЧТО УЧЕСТЬ</text>
  <g transform="translate(80,120)"><rect width="330" height="110" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="46" class="disp" font-size="26" fill="#2440C8">1</text><text x="56" y="46" class="body" font-size="19" font-weight="600" fill="#14161A">Карты</text><text x="18" y="84" class="body" font-size="15" fill="#5A5E66">Visa, Mastercard · нужна SCA</text></g>
  <g transform="translate(435,120)"><rect width="330" height="110" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="46" class="disp" font-size="26" fill="#2440C8">2</text><text x="56" y="46" class="body" font-size="19" font-weight="600" fill="#14161A">PayPal</text><text x="18" y="84" class="body" font-size="15" fill="#5A5E66">привычно клиентам · выше комиссия</text></g>
  <g transform="translate(790,120)"><rect width="330" height="110" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="46" class="disp" font-size="26" fill="#2440C8">3</text><text x="56" y="46" class="body" font-size="19" font-weight="600" fill="#14161A">Apple Pay</text><text x="18" y="84" class="body" font-size="15" fill="#5A5E66">и Google Pay · оплата в один тап</text></g>
  <g transform="translate(80,250)"><rect width="330" height="110" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="46" class="disp" font-size="26" fill="#2440C8">4</text><text x="56" y="46" class="body" font-size="19" font-weight="600" fill="#14161A">Перевод</text><text x="18" y="84" class="body" font-size="15" fill="#5A5E66">bonifico SEPA · без комиссии</text></g>
  <g transform="translate(435,250)"><rect width="330" height="110" fill="#2440C8"/><text x="18" y="46" class="disp" font-size="26" fill="#FFFFFF">5</text><text x="56" y="46" class="body" font-size="19" font-weight="600" fill="#FFFFFF">SCA</text><text x="18" y="84" class="body" font-size="15" fill="#C9D2FF">двойное подтверждение платежа</text></g>
  <g transform="translate(790,250)"><rect width="330" height="110" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="46" class="disp" font-size="26" fill="#2440C8">6</text><text x="56" y="46" class="body" font-size="19" font-weight="600" fill="#14161A">Счёт</text><text x="18" y="84" class="body" font-size="15" fill="#5A5E66">fattura по правилам страны</text></g>
  <text x="80" y="440" class="mono" font-size="15" fill="#5A5E66">SCA обязательна в ЕС; электронный счёт — по правилам вашей страны.</text>
  <text x="80" y="470" class="mono" font-size="15" fill="#5A5E66">Источник: Директива ЕС 2015/2366 (PSD2) · Еврокомиссия · Agenzia delle Entrate.</text>
</svg>
