<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-label="Le tre settimane, giorno per giorno, dalla firma alla messa online">
  <defs>
    <pattern id="gridTst" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="470" fill="#F7F6F2"/>
  <rect width="1200" height="470" fill="url(#gridTst)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">DALLA FIRMA ALL'ONLINE · 21 GIORNI — SITO AZIENDALE</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <line x1="120" y1="150" x2="1080" y2="150" stroke="#14161A" stroke-width="1.5"/>
  <circle cx="120" cy="150" r="6" fill="#2440C8"/>
  <circle cx="440" cy="150" r="6" fill="#2440C8"/>
  <circle cx="760" cy="150" r="6" fill="#2440C8"/>
  <circle cx="1080" cy="150" r="7" fill="#14161A"/>
  <text x="120" y="128" class="mono" font-size="14" fill="#2440C8">FIRMA</text>
  <text x="1080" y="128" class="mono" font-size="14" fill="#14161A" text-anchor="end">ONLINE</text>
  <!-- week 1 -->
  <g transform="translate(120,190)">
    <rect x="0" y="0" width="300" height="230" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <rect x="0" y="0" width="300" height="8" fill="#2440C8"/>
    <text x="22" y="48" class="mono" font-size="15" fill="#2440C8">SETTIMANA 1</text>
    <text x="22" y="86" class="body" font-size="24" fill="#14161A">Analisi e design</text>
    <g class="mono" font-size="15" fill="#14161A">
      <text x="22" y="132">▸ obiettivi e pubblico</text>
      <text x="22" y="166">▸ preventivo chiuso</text>
      <text x="22" y="200">▸ design approvato</text>
    </g>
  </g>
  <!-- week 2 -->
  <g transform="translate(440,190)">
    <rect x="0" y="0" width="300" height="230" fill="#FFFFFF" stroke="#2440C8" stroke-width="1.5"/>
    <rect x="0" y="0" width="300" height="8" fill="#2440C8"/>
    <text x="22" y="48" class="mono" font-size="15" fill="#2440C8">SETTIMANA 2</text>
    <text x="22" y="86" class="body" font-size="24" fill="#14161A">Sviluppo</text>
    <g class="mono" font-size="15" fill="#14161A">
      <text x="22" y="132">▸ base collaudata</text>
      <text x="22" y="166">▸ le vostre pagine</text>
      <text x="22" y="200">▸ velocità già dentro</text>
    </g>
  </g>
  <!-- week 3 -->
  <g transform="translate(760,190)">
    <rect x="0" y="0" width="320" height="230" fill="#14161A"/>
    <rect x="0" y="0" width="320" height="8" fill="#5B73E8"/>
    <text x="22" y="48" class="mono" font-size="15" fill="#9AA0AA">SETTIMANA 3</text>
    <text x="22" y="86" class="body" font-size="24" fill="#FFFFFF">Contenuti, test, online</text>
    <g class="mono" font-size="15" fill="#F7F6F2">
      <text x="22" y="132">▸ PageSpeed 90+</text>
      <text x="22" y="166">▸ accessibilità WCAG 2.1 AA</text>
      <text x="22" y="200">▸ pubblicazione</text>
    </g>
  </g>
</svg>
