<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Telegram Mini App per il business in Europa">
  <defs>
    <pattern id="gridTg" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridTg)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — БЛОГ</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">TELEGRAM MINI APP · 2026</text>
  <text x="80" y="242" class="disp" font-size="72" letter-spacing="1" fill="#14161A">ЗАКАЗ В ЧАТЕ</text>
  <text x="84" y="306" class="body" font-size="34" font-weight="600" fill="#14161A">телеграм мини-приложение для бизнеса</text>
  <text x="84" y="350" class="mono" font-size="20" fill="#5A5E66">без установки · оплата внутри · рынок ЕС почти пуст</text>
  <g transform="translate(80,432)">
    <rect x="0" y="0" width="240" height="88" fill="#2440C8"/>
    <text x="24" y="34" class="mono" font-size="13" letter-spacing="2" fill="#C9D2FF">СБОРКА</text>
    <text x="24" y="72" class="disp" font-size="32" fill="#FFFFFF">2 недели</text>
  </g>
  <g transform="translate(340,432)">
    <rect x="0" y="0" width="240" height="88" fill="none" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="34" class="mono" font-size="13" letter-spacing="2" fill="#5A5E66">УСТАНОВКА</text>
    <text x="24" y="72" class="disp" font-size="32" fill="#14161A">не нужна</text>
  </g>
  <g transform="translate(600,432)">
    <rect x="0" y="0" width="240" height="88" fill="none" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="34" class="mono" font-size="13" letter-spacing="2" fill="#5A5E66">ОПЛАТА</text>
    <text x="24" y="72" class="disp" font-size="32" fill="#14161A">в чате</text>
  </g>
  <g transform="translate(880,150)">
    <rect x="0" y="0" width="240" height="240" fill="none" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="20" y="46" class="mono" font-size="15" fill="#5A5E66">ВНУТРИ CHAT</text>
    <text x="20" y="96" class="body" font-size="21" fill="#14161A">каталог</text>
    <text x="20" y="140" class="body" font-size="21" fill="#14161A">корзина</text>
    <text x="20" y="184" class="body" font-size="21" fill="#14161A">оплата</text>
    <text x="20" y="228" class="body" font-size="21" fill="#2440C8">подтверждение</text>
  </g>
</svg>
