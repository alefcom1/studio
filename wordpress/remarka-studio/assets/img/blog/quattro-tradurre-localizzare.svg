<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-label="Tradurre contro localizzare">
  <defs>
    <pattern id="gridQd" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="470" fill="#F7F6F2"/>
  <rect width="1200" height="470" fill="url(#gridQd)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">TRADURRE ≠ LOCALIZZARE / TRANSLATE ≠ LOCALIZE</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <!-- left: tradurre -->
  <g transform="translate(80,110)">
    <rect x="0" y="0" width="480" height="300" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <rect x="0" y="0" width="480" height="8" fill="#DDDBD4"/>
    <text x="28" y="56" class="body" font-size="24" fill="#14161A">Tradurre</text>
    <text x="28" y="84" class="mono" font-size="15" fill="#5A5E66">translate — cambia le parole</text>
    <g class="mono" font-size="18" fill="#14161A">
      <text x="28" y="140">▸ stesse frasi, altra lingua</text>
      <text x="28" y="180">▸ testo «giusto ma spento»</text>
      <text x="28" y="220">▸ ok per: orari · indirizzi</text>
      <text x="28" y="260">▸ info, non vendita</text>
    </g>
  </g>
  <!-- right: localizzare -->
  <g transform="translate(640,110)">
    <rect x="0" y="0" width="480" height="300" fill="#FFFFFF" stroke="#2440C8" stroke-width="1.5"/>
    <rect x="0" y="0" width="480" height="8" fill="#2440C8"/>
    <text x="28" y="56" class="body" font-size="24" fill="#14161A">Localizzare</text>
    <text x="28" y="84" class="mono" font-size="15" fill="#2440C8">localize — adatta il messaggio</text>
    <g class="mono" font-size="18" fill="#14161A">
      <text x="28" y="140">▸ valuta € · formato data</text>
      <text x="28" y="180">▸ tono locale · esempi</text>
      <text x="28" y="220">▸ hreflang · SEO estera</text>
      <text x="28" y="260">▸ pagine che vendono</text>
    </g>
  </g>
</svg>
