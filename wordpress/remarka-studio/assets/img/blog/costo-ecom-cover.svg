<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Quanto costa un e-commerce in Italia nel 2026">
  <defs>
    <pattern id="gridCec" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridCec)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">E-COMMERCE · ITALIA 2026</text>
  <text x="80" y="256" class="disp" font-size="118" letter-spacing="1" fill="#14161A">€ 6K–25K</text>
  <text x="84" y="318" class="body" font-size="34" font-weight="600" fill="#14161A">le cifre vere di un e-commerce</text>
  <text x="84" y="362" class="mono" font-size="20" fill="#5A5E66">fasce · costi ricorrenti · cosa sposta il prezzo</text>
  <!-- our band highlight -->
  <g transform="translate(80,430)">
    <rect x="0" y="0" width="330" height="92" fill="#2440C8"/>
    <text x="24" y="37" class="mono" font-size="14" letter-spacing="2" fill="#C9D2FF">NOI · PREZZO CHIUSO</text>
    <text x="24" y="76" class="disp" font-size="40" fill="#FFFFFF">€ 7.500–14.000</text>
  </g>
  <g transform="translate(440,430)">
    <rect x="0" y="0" width="230" height="92" fill="none" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="37" class="mono" font-size="14" letter-spacing="2" fill="#5A5E66">COMMISSIONI</text>
    <text x="24" y="76" class="disp" font-size="34" fill="#14161A">1,5–3%</text>
  </g>
  <!-- price bars right -->
  <g transform="translate(770,160)">
    <rect x="0" y="0" width="120" height="30" fill="#DDDBD4"/><text x="132" y="22" class="mono" font-size="14" fill="#5A5E66">&lt; € 3.000</text>
    <rect x="0" y="54" width="250" height="30" fill="#2440C8"/><text x="262" y="76" class="mono" font-size="14" fill="#2440C8">€ 6.000–15.000</text>
    <rect x="0" y="108" width="340" height="30" fill="#14161A"/><text x="130" y="130" class="mono" font-size="14" fill="#FFFFFF">&gt; € 15.000</text>
  </g>
</svg>
