<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="WhatsApp для бизнеса в Европе: когда чат работает лучше формы">
  <defs>
    <pattern id="gridWa" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridWa)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — БЛОГ</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">WHATSAPP BUSINESS · 2026</text>
  <text x="80" y="242" class="disp" font-size="66" letter-spacing="1" fill="#14161A">ЧАТ, НЕ ФОРМА</text>
  <text x="84" y="306" class="body" font-size="34" font-weight="600" fill="#14161A">whatsapp для бизнеса в Европе</text>
  <text x="84" y="350" class="mono" font-size="20" fill="#5A5E66">когда сообщение работает лучше формы</text>
  <g transform="translate(80,432)">
    <rect x="0" y="0" width="240" height="88" fill="#2440C8"/>
    <text x="24" y="34" class="mono" font-size="13" letter-spacing="2" fill="#C9D2FF">ОТКРЫВАЕМОСТЬ</text>
    <text x="24" y="72" class="disp" font-size="32" fill="#FFFFFF">выше</text>
  </g>
  <g transform="translate(340,432)">
    <rect x="0" y="0" width="240" height="88" fill="none" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="34" class="mono" font-size="13" letter-spacing="2" fill="#5A5E66">УСТАНОВКА</text>
    <text x="24" y="72" class="disp" font-size="32" fill="#14161A">не нужна</text>
  </g>
  <g transform="translate(600,432)">
    <rect x="0" y="0" width="240" height="88" fill="none" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="34" class="mono" font-size="13" letter-spacing="2" fill="#5A5E66">ОТВЕТ</text>
    <text x="24" y="72" class="disp" font-size="32" fill="#14161A">в чате</text>
  </g>
  <g transform="translate(880,150)">
    <rect x="0" y="0" width="240" height="240" fill="none" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="20" y="46" class="mono" font-size="15" fill="#5A5E66">ВНУТРИ ЧАТА</text>
    <text x="20" y="96" class="body" font-size="21" fill="#14161A">вопрос</text>
    <text x="20" y="140" class="body" font-size="21" fill="#14161A">фото и цена</text>
    <text x="20" y="184" class="body" font-size="21" fill="#14161A">договор</text>
    <text x="20" y="228" class="body" font-size="21" fill="#2440C8">заказ</text>
  </g>
</svg>
