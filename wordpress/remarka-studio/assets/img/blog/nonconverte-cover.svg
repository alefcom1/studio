<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Perché il sito non converte: sette fughe silenziose tra le visite e le richieste">
  <defs>
    <pattern id="gridNcc" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridNcc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">CONVERSIONE · 2026</text>
  <text x="80" y="238" class="disp" font-size="96" letter-spacing="1" fill="#14161A">Sette fughe,</text>
  <text x="80" y="330" class="disp" font-size="96" letter-spacing="1" fill="#14161A">zero richieste.</text>
  <text x="84" y="392" class="mono" font-size="20" fill="#5A5E66">perché il sito non converte — e da dove se ne vanno le visite</text>
  <!-- funnel: 100 visite → 1 richiesta -->
  <g transform="translate(80,452)">
    <rect x="0" y="0" width="300" height="110" fill="#2440C8"/>
    <text x="24" y="40" class="mono" font-size="14" letter-spacing="2" fill="#C9D2FF">ENTRANO</text>
    <text x="24" y="88" class="disp" font-size="46" fill="#FFFFFF">100 visite</text>
  </g>
  <g class="mono" font-size="30" fill="#9AA0AA">
    <text x="404" y="522">→</text>
    <text x="470" y="522" fill="#5A5E66" font-size="15">7 fughe silenziose</text>
    <text x="770" y="522">→</text>
  </g>
  <g transform="translate(820,452)">
    <rect x="0" y="0" width="300" height="110" fill="#14161A"/>
    <text x="24" y="40" class="mono" font-size="14" letter-spacing="2" fill="#9AA0AA">ESCE</text>
    <text x="24" y="88" class="disp" font-size="46" fill="#FFFFFF">1 richiesta</text>
  </g>
</svg>
