<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Cookie policy o privacy policy: cosa serve davvero e a chi, i due documenti a confronto">
  <defs>
    <pattern id="gridCkp" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridCkp)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">NORME · 2026</text>
  <text x="80" y="238" class="disp" font-size="88" letter-spacing="1" fill="#14161A">Cookie policy</text>
  <text x="80" y="322" class="disp" font-size="88" letter-spacing="1" fill="#14161A">o privacy policy?</text>
  <text x="84" y="384" class="mono" font-size="20" fill="#5A5E66">due documenti, due scopi — cosa serve davvero e a chi</text>
  <g transform="translate(80,444)">
    <rect x="0" y="0" width="500" height="122" fill="#2440C8"/>
    <text x="26" y="42" class="mono" font-size="14" letter-spacing="2" fill="#C9D2FF">PRIVACY POLICY</text>
    <text x="26" y="80" class="body" font-size="21" fill="#FFFFFF">tutti i dati personali</text>
    <text x="26" y="106" class="mono" font-size="13" fill="#C9D2FF">GDPR art. 13–14 · sempre</text>
  </g>
  <g transform="translate(600,444)">
    <rect x="0" y="0" width="498" height="122" fill="#14161A"/>
    <text x="26" y="42" class="mono" font-size="14" letter-spacing="2" fill="#9AA0AA">COOKIE POLICY</text>
    <text x="26" y="80" class="body" font-size="21" fill="#FFFFFF">i tracciatori + banner</text>
    <text x="26" y="106" class="mono" font-size="13" fill="#9AA0AA">se usate cookie non tecnici</text>
  </g>
</svg>
