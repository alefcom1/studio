<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Le tre soglie INP dei Core Web Vitals: buono sotto 200 ms, da migliorare 200-500 ms, scadente oltre 500 ms">
  <defs>
    <pattern id="gridInps" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="500" fill="#F7F6F2"/>
  <rect width="1200" height="500" fill="url(#gridInps)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">INP — INTERACTION TO NEXT PAINT · SOGLIE AL 75° PERCENTILE</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <g transform="translate(80,124)">
    <rect x="0" y="0" width="318" height="200" fill="#2440C8"/>
    <text x="28" y="72" class="disp" font-size="56" fill="#FFFFFF">&lt; 200 ms</text>
    <text x="28" y="130" class="body" font-size="22" fill="#FFFFFF">buono</text>
    <text x="28" y="164" class="mono" font-size="14" fill="#C9D2FF">risposta immediata</text>
  </g>
  <g transform="translate(430,124)">
    <rect x="0" y="0" width="318" height="200" fill="#5B73E8"/>
    <text x="28" y="72" class="disp" font-size="50" fill="#FFFFFF">200–500 ms</text>
    <text x="28" y="130" class="body" font-size="22" fill="#FFFFFF">da migliorare</text>
    <text x="28" y="164" class="mono" font-size="14" fill="#EEF1FE">c'è margine di lavoro</text>
  </g>
  <g transform="translate(780,124)">
    <rect x="0" y="0" width="318" height="200" fill="#14161A"/>
    <text x="28" y="72" class="disp" font-size="56" fill="#FFFFFF">&gt; 500 ms</text>
    <text x="28" y="130" class="body" font-size="22" fill="#FFFFFF">scadente</text>
    <text x="28" y="164" class="mono" font-size="14" fill="#9AA0AA">ritardo che si sente</text>
  </g>
  <g transform="translate(80,360)">
    <rect x="0" y="0" width="1018" height="54" fill="#EEF1FE" stroke="#2440C8" stroke-width="1"/>
    <text x="20" y="33" class="mono" font-size="15" fill="#2440C8">INP misura il ritardo tra il tocco e la risposta visibile: la reattività che l'utente sente davvero.</text>
  </g>
  <text x="80" y="456" class="body" font-size="15" fill="#5A5E66">Il freno più comune è il JavaScript che tiene occupato il thread principale del browser.</text>
</svg>
