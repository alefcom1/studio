<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="GDPR per il business di lingua russa nell'UE">
  <defs>
    <pattern id="gridGdpr" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridGdpr)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — БЛОГ</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">GDPR · ЕС 2026</text>
  <text x="80" y="252" class="disp" font-size="116" letter-spacing="2" fill="#14161A">GDPR</text>
  <text x="84" y="316" class="body" font-size="34" font-weight="600" fill="#14161A">для бизнеса в ЕС — без паники</text>
  <text x="84" y="360" class="mono" font-size="20" fill="#5A5E66">регламент 2016/679 · штраф до € 20 млн или 4%</text>
  <g transform="translate(80,430)">
    <rect x="0" y="0" width="300" height="92" fill="#14161A"/>
    <text x="24" y="37" class="mono" font-size="13" letter-spacing="2" fill="#C9D2FF">МАКС. ШТРАФ</text>
    <text x="24" y="76" class="disp" font-size="34" fill="#FFFFFF">€ 20 млн / 4%</text>
  </g>
  <g transform="translate(410,430)">
    <rect x="0" y="0" width="300" height="92" fill="#2440C8"/>
    <text x="24" y="37" class="mono" font-size="13" letter-spacing="2" fill="#C9D2FF">НА ДЕЛЕ — 6 ШАГОВ</text>
    <text x="24" y="76" class="disp" font-size="34" fill="#FFFFFF">это выполнимо</text>
  </g>
  <g transform="translate(820,150)">
    <rect x="0" y="0" width="300" height="240" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="20" y="44" class="mono" font-size="14" fill="#5A5E66">ЧЕК-ЛИСТ</text>
    <text x="20" y="88" class="body" font-size="19" fill="#14161A">☐ политика конфид.</text>
    <text x="20" y="126" class="body" font-size="19" fill="#14161A">☐ cookie-баннер</text>
    <text x="20" y="164" class="body" font-size="19" fill="#14161A">☐ согласие в форме</text>
    <text x="20" y="202" class="body" font-size="19" fill="#2440C8">☑ данные в ЕС</text>
  </g>
</svg>
