<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Migrare da WordPress senza perdere la SEO">
  <defs>
    <pattern id="gridMc" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <marker id="arrMc" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M0 0 L10 6 L0 12" fill="none" stroke="#2440C8" stroke-width="2"/>
    </marker>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridMc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">WORDPRESS · SEO</text>
  <text x="80" y="262" class="disp" font-size="150" letter-spacing="2" fill="#14161A">301</text>
  <text x="82" y="326" class="body" font-size="34" font-weight="600" fill="#14161A">Migrare senza perdere posizioni</text>
  <text x="84" y="370" class="mono" font-size="20" fill="#5A5E66">redirect · URL map · monitoraggio</text>
  <!-- bottom metric boxes -->
  <g transform="translate(80,430)">
    <rect x="0" y="0" width="230" height="92" fill="#2440C8"/>
    <text x="24" y="37" class="mono" font-size="14" letter-spacing="2" fill="#C9D2FF">REDIRECT</text>
    <text x="24" y="76" class="disp" font-size="40" fill="#FFFFFF">1 → 1</text>
  </g>
  <g transform="translate(340,430)">
    <rect x="0" y="0" width="270" height="92" fill="none" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="37" class="mono" font-size="14" letter-spacing="2" fill="#5A5E66">MONITORAGGIO</text>
    <text x="24" y="76" class="disp" font-size="40" fill="#14161A">6 sett.</text>
  </g>
  <!-- redirect motif right -->
  <g transform="translate(760,150)">
    <g class="mono" font-size="16" fill="#5A5E66">
      <rect x="0" y="0" width="150" height="40" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/><text x="16" y="26" fill="#14161A">/vecchio</text>
      <line x1="160" y1="20" x2="220" y2="20" stroke="#2440C8" stroke-width="2" marker-end="url(#arrMc)"/>
      <rect x="230" y="0" width="130" height="40" fill="#EEF1FE" stroke="#2440C8" stroke-width="1.5"/><text x="248" y="26" fill="#2440C8">/nuovo</text>
      <rect x="0" y="70" width="150" height="40" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/><text x="16" y="96" fill="#14161A">/blog/x</text>
      <line x1="160" y1="90" x2="220" y2="90" stroke="#2440C8" stroke-width="2" marker-end="url(#arrMc)"/>
      <rect x="230" y="70" width="130" height="40" fill="#EEF1FE" stroke="#2440C8" stroke-width="1.5"/><text x="248" y="96" fill="#2440C8">/blog/y</text>
      <rect x="0" y="140" width="150" height="40" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/><text x="16" y="166" fill="#14161A">/prodotto</text>
      <line x1="160" y1="160" x2="220" y2="160" stroke="#2440C8" stroke-width="2" marker-end="url(#arrMc)"/>
      <rect x="230" y="140" width="130" height="40" fill="#EEF1FE" stroke="#2440C8" stroke-width="1.5"/><text x="248" y="166" fill="#2440C8">/nuovo-p</text>
    </g>
  </g>
</svg>
