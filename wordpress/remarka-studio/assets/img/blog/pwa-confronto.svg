<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Confronto tra sito, PWA e app nativa">
  <defs>
    <pattern id="gridPd" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="500" fill="#F7F6F2"/>
  <rect width="1200" height="500" fill="url(#gridPd)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">SITO · PWA · APP NATIVA — CONFRONTO / COMPARISON</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <!-- column headers -->
  <g class="body" font-size="20" text-anchor="middle">
    <text x="600" y="120" fill="#14161A">Sito</text>
    <text x="810" y="120" fill="#2440C8">PWA</text>
    <text x="1020" y="120" fill="#14161A">App nativa</text>
  </g>
  <text x="500" y="120" class="mono" font-size="14" fill="#5A5E66" text-anchor="end">CAPACITÀ / FEATURE</text>
  <line x1="80" y1="138" x2="1120" y2="138" stroke="#DDDBD4" stroke-width="1"/>
  <!-- highlight PWA column -->
  <rect x="740" y="146" width="140" height="290" fill="#EEF1FE"/>
  <g class="mono" font-size="16" fill="#14161A">
    <!-- rows: label, sito, pwa, native -->
    <g transform="translate(0,180)">
      <text x="80" y="0">Installabile / installable</text>
      <text x="600" y="0" text-anchor="middle" fill="#cc3333">✗</text>
      <text x="810" y="0" text-anchor="middle" fill="#1E7F4F">✓</text>
      <text x="1020" y="0" text-anchor="middle" fill="#1E7F4F">✓</text>
    </g>
    <g transform="translate(0,228)">
      <text x="80" y="0">Offline</text>
      <text x="600" y="0" text-anchor="middle" fill="#cc3333">✗</text>
      <text x="810" y="0" text-anchor="middle" fill="#1E7F4F">✓</text>
      <text x="1020" y="0" text-anchor="middle" fill="#1E7F4F">✓</text>
    </g>
    <g transform="translate(0,276)">
      <text x="80" y="0">Notifiche / push</text>
      <text x="600" y="0" text-anchor="middle" fill="#cc3333">✗</text>
      <text x="810" y="0" text-anchor="middle" fill="#1E7F4F">✓</text>
      <text x="1020" y="0" text-anchor="middle" fill="#1E7F4F">✓</text>
    </g>
    <g transform="translate(0,324)">
      <text x="80" y="0">Senza store / no store</text>
      <text x="600" y="0" text-anchor="middle" fill="#1E7F4F">✓</text>
      <text x="810" y="0" text-anchor="middle" fill="#1E7F4F">✓</text>
      <text x="1020" y="0" text-anchor="middle" fill="#cc3333">✗</text>
    </g>
    <line x1="80" y1="348" x2="1120" y2="348" stroke="#DDDBD4" stroke-width="1"/>
    <g transform="translate(0,392)" class="body" font-size="18">
      <text x="80" y="0" fill="#14161A">Costo di partenza / from</text>
      <text x="600" y="0" text-anchor="middle" fill="#5A5E66">—</text>
      <text x="810" y="0" text-anchor="middle" fill="#2440C8">= sito</text>
      <text x="1020" y="0" text-anchor="middle" fill="#14161A">€ 15.000</text>
    </g>
  </g>
</svg>
