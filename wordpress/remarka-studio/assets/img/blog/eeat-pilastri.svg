      <rect width="245" height="8" fill="#2440C8"/>
      <text x="20" y="52" font-size="20" fill="#FFFFFF">Trust</text>
      <text x="20" y="78" class="mono" font-size="14" fill="#9AA0AA">Affidabilità · core</text>
