<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Quanto costa un sito in Italia: cifre oneste">
  <defs>
    <pattern id="gridCena" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridCena)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — БЛОГ</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">ЦЕНЫ · ИТАЛИЯ 2026</text>
  <text x="80" y="256" class="disp" font-size="108" letter-spacing="1" fill="#14161A">€ 1,9K–14K</text>
  <text x="84" y="318" class="body" font-size="34" font-weight="600" fill="#14161A">сколько стоит сайт в Италии</text>
  <text x="84" y="362" class="mono" font-size="20" fill="#5A5E66">честные цифры · визитка → магазин</text>
  <g transform="translate(770,150)">
