    <rect x="0" y="42" width="120" height="30" fill="#DDDBD4"/><text x="132" y="64" class="mono" font-size="15" fill="#5A5E66">€ 1 900–2 800</text>
    <text x="0" y="112" class="mono" font-size="14" fill="#5A5E66">КОРПОРАТИВНЫЙ</text>
    <rect x="0" y="124" width="230" height="30" fill="#2440C8"/><text x="242" y="146" class="mono" font-size="15" fill="#2440C8">€ 3 900–5 800</text>
    <text x="0" y="194" class="mono" font-size="14" fill="#5A5E66">МАГАЗИН</text>
    <rect x="0" y="206" width="330" height="30" fill="#14161A"/><text x="130" y="228" class="mono" font-size="15" fill="#FFFFFF">€ 7 500–14 000</text>
