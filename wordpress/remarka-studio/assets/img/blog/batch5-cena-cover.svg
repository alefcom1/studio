    <rect x="0" y="0" width="290" height="92" fill="none" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="37" class="mono" font-size="13" letter-spacing="2" fill="#5A5E66">ОПОЗДАНИЕ</text>
    <text x="24" y="76" class="disp" font-size="30" fill="#14161A">−1% в день</text>
