<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Le quattro misure del monitoraggio di un sito web">
  <defs>
    <pattern id="gridMq" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}</style>
  </defs>
  <rect width="1200" height="500" fill="#F7F6F2"/>
  <rect width="1200" height="500" fill="url(#gridMq)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">MONITORAGGIO · 4 MISURE, IN ORDINE</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <g transform="translate(80,110)">
    <!-- 01 uptime -->
    <g>
      <rect x="0" y="0" width="505" height="160" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
      <rect x="0" y="0" width="505" height="6" fill="#2440C8"/>
      <text x="24" y="46" class="mono" font-size="14" fill="#2440C8">/01 · UPTIME</text>
      <text x="24" y="86" class="body" font-size="24" fill="#14161A">Il sito risponde?</text>
      <g transform="translate(24,110)">
        <rect x="0" y="0" width="24" height="16" fill="#1E7F4F"/><rect x="28" y="0" width="24" height="16" fill="#1E7F4F"/><rect x="56" y="0" width="24" height="16" fill="#1E7F4F"/><rect x="84" y="0" width="24" height="16" fill="#C0452C"/><rect x="112" y="0" width="24" height="16" fill="#1E7F4F"/><rect x="140" y="0" width="24" height="16" fill="#1E7F4F"/><rect x="168" y="0" width="24" height="16" fill="#1E7F4F"/><rect x="196" y="0" width="24" height="16" fill="#1E7F4F"/>
        <text x="240" y="14" class="mono" font-size="13" fill="#5A5E66">check ~5 min + alert</text>
      </g>
    </g>
    <!-- 02 cwv -->
    <g transform="translate(535,0)">
      <rect x="0" y="0" width="505" height="160" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
      <rect x="0" y="0" width="505" height="6" fill="#2440C8"/>
      <text x="24" y="46" class="mono" font-size="14" fill="#2440C8">/02 · CORE WEB VITALS</text>
      <text x="24" y="86" class="body" font-size="24" fill="#14161A">Utenti reali, non laboratorio</text>
      <text x="24" y="122" class="mono" font-size="14" fill="#5A5E66">CrUX · 28 giorni · LCP / INP / CLS</text>
    </g>
    <!-- 03 funzioni -->
    <g transform="translate(0,185)">
      <rect x="0" y="0" width="505" height="160" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
      <rect x="0" y="0" width="505" height="6" fill="#2440C8"/>
      <text x="24" y="46" class="mono" font-size="14" fill="#2440C8">/03 · FUNZIONI CRITICHE</text>
      <text x="24" y="86" class="body" font-size="24" fill="#14161A">Moduli, carrello, prenotazioni</text>
      <text x="24" y="122" class="mono" font-size="14" fill="#5A5E66">form ✓ · checkout ✓ · e-mail ✓</text>
    </g>
    <!-- 04 visibilità -->
    <g transform="translate(535,185)">
      <rect x="0" y="0" width="505" height="160" fill="#14161A"/>
      <rect x="0" y="0" width="505" height="6" fill="#2440C8"/>
      <text x="24" y="46" class="mono" font-size="14" fill="#9AA0AA">/04 · VISIBILITÀ</text>
      <text x="24" y="86" class="body" font-size="24" fill="#F7F6F2">Indice, errori, posizioni</text>
      <text x="24" y="122" class="mono" font-size="14" fill="#9AA0AA">Search Console · SERP</text>
    </g>
  </g>
</svg>
