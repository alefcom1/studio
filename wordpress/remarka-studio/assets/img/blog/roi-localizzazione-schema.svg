<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Come si costruisce il ROI della localizzazione: il costo dell'adattamento contro tre leve">
  <defs>
    <pattern id="gridRis" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}</style>
  </defs>
  <rect width="1200" height="520" fill="#F7F6F2"/>
  <rect width="1200" height="520" fill="url(#gridRis)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">ROI DELLA LOCALIZZAZIONE — COSTO CONTRO TRE LEVE</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>

  <g transform="translate(80,120)">
    <rect x="0" y="0" width="220" height="230" fill="#14161A"/>
    <text x="24" y="52" class="mono" font-size="14" letter-spacing="2" fill="#9AA0AA">COSTO</text>
    <text x="24" y="98" class="body" font-size="26" fill="#FFFFFF">Adattamento</text>
    <text x="24" y="150" class="mono" font-size="14" fill="#B7BEC9">una tantum</text>
    <text x="24" y="174" class="mono" font-size="14" fill="#B7BEC9">+ manutenzione</text>
  </g>
  <text x="322" y="245" class="body" font-size="40" fill="#2440C8">&lt;</text>

  <g transform="translate(370,120)">
    <rect x="0" y="0" width="230" height="230" fill="#FFFFFF" stroke="#2440C8" stroke-width="1.5"/>
    <rect x="0" y="0" width="230" height="8" fill="#2440C8"/>
    <text x="24" y="54" class="mono" font-size="14" fill="#2440C8">01</text>
    <text x="24" y="92" class="body" font-size="24" fill="#14161A">Mercato</text>
    <text x="24" y="140" class="mono" font-size="13" fill="#5A5E66">un pubblico che</text>
    <text x="24" y="160" class="mono" font-size="13" fill="#5A5E66">prima non capiva</text>
  </g>
  <g transform="translate(632,120)">
    <rect x="0" y="0" width="230" height="230" fill="#FFFFFF" stroke="#2440C8" stroke-width="1.5"/>
    <rect x="0" y="0" width="230" height="8" fill="#2440C8"/>
    <text x="24" y="54" class="mono" font-size="14" fill="#2440C8">02</text>
    <text x="24" y="92" class="body" font-size="24" fill="#14161A">Visibilità</text>
    <text x="24" y="140" class="mono" font-size="13" fill="#5A5E66">traffico dalle ricerche</text>
    <text x="24" y="160" class="mono" font-size="13" fill="#5A5E66">in quella lingua</text>
  </g>
  <g transform="translate(894,120)">
    <rect x="0" y="0" width="226" height="230" fill="#FFFFFF" stroke="#2440C8" stroke-width="1.5"/>
    <rect x="0" y="0" width="226" height="8" fill="#2440C8"/>
    <text x="24" y="54" class="mono" font-size="14" fill="#2440C8">03</text>
    <text x="24" y="92" class="body" font-size="24" fill="#14161A">Conversione</text>
    <text x="24" y="140" class="mono" font-size="13" fill="#5A5E66">chi legge nella sua</text>
    <text x="24" y="160" class="mono" font-size="13" fill="#5A5E66">lingua si fida di più</text>
  </g>

  <g transform="translate(80,400)">
    <rect x="0" y="0" width="1040" height="72" fill="#EEF1FE" stroke="#2440C8" stroke-width="1"/>
    <text x="24" y="44" class="mono" font-size="14.5" fill="#2440C8">Le tre leve si moltiplicano, non si sommano: il ritorno arriva quando, insieme, superano il costo.</text>
  </g>
</svg>
