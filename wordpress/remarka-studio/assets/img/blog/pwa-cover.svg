<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="PWA per le PMI">
  <defs>
    <pattern id="gridPc" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="630" fill="#F7F6F2"/>
  <rect width="1200" height="630" fill="url(#gridPc)"/>
  <line x1="80" y1="96" x2="1120" y2="96" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="82" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">REMARKA · STUDIO — BLOG</text>
  <text x="1120" y="82" class="mono" font-size="15" letter-spacing="2" fill="#2440C8" text-anchor="end">PROGRESSIVE WEB APP</text>
  <text x="80" y="262" class="disp" font-size="150" letter-spacing="2" fill="#14161A">PWA</text>
  <text x="82" y="326" class="body" font-size="34" font-weight="600" fill="#14161A">quando l’app nativa non serve</text>
  <text x="84" y="370" class="mono" font-size="20" fill="#5A5E66">installabile · offline · notifiche</text>
  <!-- bottom metric boxes -->
  <g transform="translate(80,430)">
    <rect x="0" y="0" width="230" height="92" fill="none" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="37" class="mono" font-size="14" letter-spacing="2" fill="#5A5E66">APP NATIVA</text>
    <text x="24" y="76" class="disp" font-size="34" fill="#14161A">€ 15K+</text>
  </g>
  <g transform="translate(340,430)">
    <rect x="0" y="0" width="230" height="92" fill="#1E7F4F"/>
    <text x="24" y="37" class="mono" font-size="14" letter-spacing="2" fill="#BFE6CE">PWA · CODEBASE</text>
    <text x="24" y="76" class="disp" font-size="40" fill="#FFFFFF">1</text>
  </g>
  <!-- phone with install badge right -->
  <g transform="translate(830,140)">
    <rect x="0" y="0" width="230" height="330" rx="28" fill="#FFFFFF" stroke="#14161A" stroke-width="2"/>
    <rect x="0" y="0" width="230" height="330" rx="28" fill="url(#gridPc)" opacity="0.5"/>
    <rect x="86" y="18" width="58" height="10" rx="5" fill="#DDDBD4"/>
    <g transform="translate(64,110)">
      <rect x="0" y="0" width="100" height="100" rx="22" fill="#2440C8"/>
      <text x="50" y="64" class="disp" font-size="40" fill="#FFFFFF" text-anchor="middle">P</text>
    </g>
    <rect x="55" y="238" width="120" height="40" rx="20" fill="#14161A"/>
    <text x="115" y="264" class="mono" font-size="14" fill="#FFFFFF" text-anchor="middle">+ installa</text>
  </g>
</svg>
