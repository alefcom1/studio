<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="Otto segnali di fiducia per scegliere un'agenzia web">
  <defs>
    <pattern id="gridFid8" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="600" fill="#F7F6F2"/>
  <rect width="1200" height="600" fill="url(#gridFid8)"/>
  <line x1="80" y1="86" x2="1120" y2="86" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="72" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">ВОСЕМЬ СИГНАЛОВ, КОТОРЫЕ ВИДНО ДО ПОДПИСИ</text>
  <g transform="translate(80,120)"><rect width="245" height="100" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="42" class="disp" font-size="28" fill="#2440C8">1</text><text x="60" y="42" class="body" font-size="19" font-weight="600" fill="#14161A">Портфолио</text><text x="18" y="78" class="body" font-size="15" fill="#5A5E66">живые сайты по ссылкам</text></g>
  <g transform="translate(345,120)"><rect width="245" height="100" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="42" class="disp" font-size="28" fill="#2440C8">2</text><text x="60" y="42" class="body" font-size="19" font-weight="600" fill="#14161A">Скорость</text><text x="18" y="78" class="body" font-size="15" fill="#5A5E66">измеримая числом</text></g>
  <g transform="translate(610,120)"><rect width="245" height="100" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="42" class="disp" font-size="28" fill="#2440C8">3</text><text x="60" y="42" class="body" font-size="19" font-weight="600" fill="#14161A">Договор</text><text x="18" y="78" class="body" font-size="15" fill="#5A5E66">объём работ словами</text></g>
  <g transform="translate(875,120)"><rect width="245" height="100" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="42" class="disp" font-size="28" fill="#2440C8">4</text><text x="60" y="42" class="body" font-size="19" font-weight="600" fill="#14161A">Гарантии</text><text x="18" y="78" class="body" font-size="15" fill="#5A5E66">числом, не на словах</text></g>
  <g transform="translate(80,245)"><rect width="245" height="100" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="42" class="disp" font-size="28" fill="#2440C8">5</text><text x="60" y="42" class="body" font-size="19" font-weight="600" fill="#14161A">Права</text><text x="18" y="78" class="body" font-size="15" fill="#5A5E66">домен и код — ваши</text></g>
  <g transform="translate(345,245)"><rect width="245" height="100" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="42" class="disp" font-size="28" fill="#2440C8">6</text><text x="60" y="42" class="body" font-size="19" font-weight="600" fill="#14161A">GDPR</text><text x="18" y="78" class="body" font-size="15" fill="#5A5E66">и cookie по умолчанию</text></g>
  <g transform="translate(610,245)"><rect width="245" height="100" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/><text x="18" y="42" class="disp" font-size="28" fill="#2440C8">7</text><text x="60" y="42" class="body" font-size="19" font-weight="600" fill="#14161A">Доступность</text><text x="18" y="78" class="body" font-size="15" fill="#5A5E66">знает про EAA</text></g>
  <g transform="translate(875,245)"><rect width="245" height="100" fill="#2440C8"/><text x="18" y="42" class="disp" font-size="28" fill="#FFFFFF">8</text><text x="60" y="42" class="body" font-size="19" font-weight="600" fill="#FFFFFF">Поддержка</text><text x="18" y="78" class="body" font-size="15" fill="#C9D2FF">срок и цена ясны</text></g>
  <text x="80" y="430" class="mono" font-size="15" fill="#5A5E66">Красный флаг — если студия уходит от прямого ответа хотя бы по трём пунктам.</text>
  <text x="80" y="460" class="mono" font-size="15" fill="#5A5E66">Источник: Google E-E-A-T · web.dev Web Vitals · Регламент ЕС 2016/679 · Директива 2019/882.</text>
</svg>
