<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Le voci di un preventivo sito web e quanto spostano il prezzo">
  <defs>
    <pattern id="gridPvv" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}
    </style>
  </defs>
  <rect width="1200" height="500" fill="#F7F6F2"/>
  <rect width="1200" height="500" fill="url(#gridPvv)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">LE VOCI DI UN PREVENTIVO — QUANTO SPOSTANO IL PREZZO</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="112" class="mono" font-size="14" fill="#5A5E66">peso sul prezzo →</text>
  <!-- rows -->
  <g class="mono" font-size="15">
    <g transform="translate(80,132)">
      <text x="0" y="20" fill="#14161A" class="body" font-size="17">Design e struttura</text>
      <rect x="360" y="4" width="620" height="22" fill="#2440C8"/>
      <text x="992" y="21" fill="#2440C8">su misura ⇄ template</text>
    </g>
    <g transform="translate(80,178)">
      <text x="0" y="20" fill="#14161A" class="body" font-size="17">Contenuti (testi, foto, lingue)</text>
      <rect x="360" y="4" width="560" height="22" fill="#2440C8"/>
      <text x="932" y="21" fill="#2440C8">spesso «non compresi»</text>
    </g>
    <g transform="translate(80,224)">
      <text x="0" y="20" fill="#14161A" class="body" font-size="17">Sviluppo e integrazioni</text>
      <rect x="360" y="4" width="430" height="22" fill="#5B73E8"/>
      <text x="802" y="21" fill="#5A5E66">CMS · moduli · hosting</text>
    </g>
    <g transform="translate(80,270)">
      <text x="0" y="20" fill="#14161A" class="body" font-size="17">SEO tecnica e velocità</text>
      <rect x="360" y="4" width="300" height="22" fill="#5B73E8"/>
      <text x="672" y="21" fill="#5A5E66">PageSpeed 90+ garantito?</text>
    </g>
    <g transform="translate(80,316)">
      <text x="0" y="20" fill="#14161A" class="body" font-size="17">Accessibilità (EAA)</text>
      <rect x="360" y="4" width="230" height="22" fill="#14161A"/>
      <text x="602" y="21" fill="#5A5E66">obbligo dal 28.06.2025</text>
    </g>
    <g transform="translate(80,362)">
      <text x="0" y="20" fill="#14161A" class="body" font-size="17">Assistenza e proprietà</text>
      <rect x="360" y="4" width="180" height="22" fill="#DDDBD4"/>
      <text x="552" y="21" fill="#5A5E66">per quanto? di chi sono i dati?</text>
    </g>
  </g>
  <g transform="translate(80,414)">
    <rect x="0" y="0" width="1000" height="44" fill="#EEF1FE" stroke="#2440C8" stroke-width="1"/>
    <text x="18" y="28" class="mono" font-size="15" fill="#2440C8">La riga che cambia tutto: prezzo CHIUSO o «indicativo»? Data in contratto o «in primavera»?</text>
  </g>
</svg>
