<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Quattro passi per entrare nel mercato italiano">
  <defs>
    <pattern id="gridMktS" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="520" fill="#F7F6F2"/>
  <rect width="1200" height="520" fill="url(#gridMktS)"/>
  <line x1="80" y1="86" x2="1120" y2="86" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="72" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">ВЫХОД НА РЫНОК ИТАЛИИ — ПОРЯДОК ДЕЙСТВИЙ</text>
  <g transform="translate(80,140)">
    <rect x="0" y="0" width="250" height="300" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="56" class="disp" font-size="52" fill="#2440C8">01</text>
    <text x="24" y="110" class="body" font-size="23" font-weight="600" fill="#14161A">Основа</text>
    <text x="24" y="152" class="body" font-size="18" fill="#5A5E66">домен .it, хостинг</text>
    <text x="24" y="180" class="body" font-size="18" fill="#5A5E66">рядом с клиентом,</text>
    <text x="24" y="208" class="body" font-size="18" fill="#5A5E66">скорость на</text>
    <text x="24" y="236" class="body" font-size="18" fill="#5A5E66">мобильных</text>
  </g>
  <g transform="translate(360,140)">
    <rect x="0" y="0" width="250" height="300" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="56" class="disp" font-size="52" fill="#2440C8">02</text>
    <text x="24" y="110" class="body" font-size="23" font-weight="600" fill="#14161A">Тексты</text>
    <text x="24" y="152" class="body" font-size="18" fill="#5A5E66">локализация под</text>
    <text x="24" y="180" class="body" font-size="18" fill="#5A5E66">итальянца, а не</text>
    <text x="24" y="208" class="body" font-size="18" fill="#5A5E66">машинный перевод</text>
  </g>
  <g transform="translate(640,140)">
    <rect x="0" y="0" width="250" height="300" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="24" y="56" class="disp" font-size="52" fill="#2440C8">03</text>
    <text x="24" y="110" class="body" font-size="23" font-weight="600" fill="#14161A">Право</text>
    <text x="24" y="152" class="body" font-size="18" fill="#5A5E66">GDPR, cookie,</text>
    <text x="24" y="180" class="body" font-size="18" fill="#5A5E66">электронный счёт</text>
    <text x="24" y="208" class="body" font-size="18" fill="#5A5E66">SDI, доступность</text>
  </g>
  <g transform="translate(920,140)">
    <rect x="0" y="0" width="200" height="300" fill="#2440C8"/>
    <text x="24" y="56" class="disp" font-size="52" fill="#FFFFFF">04</text>
    <text x="24" y="110" class="body" font-size="23" font-weight="600" fill="#FFFFFF">Видимость</text>
    <text x="24" y="152" class="body" font-size="18" fill="#C9D2FF">SEO в Google.it,</text>
    <text x="24" y="180" class="body" font-size="18" fill="#C9D2FF">карточка бизнеса,</text>
    <text x="24" y="208" class="body" font-size="18" fill="#C9D2FF">первые клиенты</text>
  </g>
</svg>
