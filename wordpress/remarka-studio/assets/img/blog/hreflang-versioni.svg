<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Come si citano le versioni con hreflang">
  <defs>
    <pattern id="gridHv" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/></pattern>
    <style>.mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}.body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;font-weight:600;}</style>
  </defs>
  <rect width="1200" height="500" fill="#F7F6F2"/>
  <rect width="1200" height="500" fill="url(#gridHv)"/>
  <text x="80" y="58" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">RIFERIMENTI RECIPROCI E COMPLETI</text>
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#14161A" stroke-width="1.5"/>
  <!-- IT code block, center -->
  <g transform="translate(360,120)">
    <rect x="0" y="0" width="480" height="180" fill="#14161A"/>
    <text x="24" y="40" class="mono" font-size="14" fill="#9AA0AA">PAGINA IT — dichiara TUTTE le versioni</text>
    <g class="mono" font-size="14" fill="#F7F6F2">
      <text x="24" y="76">hreflang="it" → /pagina/</text>
      <text x="24" y="104">hreflang="en" → /en/page/</text>
      <text x="24" y="132">hreflang="de" → /de/seite/</text>
    </g>
    <text x="24" y="164" class="mono" font-size="13" fill="#5B73E8">+ sé stessa (autoreferenza)</text>
  </g>
  <!-- reciprocity note -->
  <g transform="translate(80,340)">
    <rect x="0" y="0" width="1040" height="110" fill="#FFFFFF" stroke="#DDDBD4" stroke-width="1.5"/>
    <text x="28" y="42" class="mono" font-size="14" fill="#2440C8">LA REGOLA D'ORO</text>
    <text x="28" y="76" class="body" font-size="20" fill="#14161A">se IT punta a EN, EN deve puntare a IT — e ogni versione elenca tutte le altre, sé stessa compresa</text>
    <text x="28" y="100" class="mono" font-size="13" fill="#5A5E66">riferimenti non reciproci = Google li ignora e torna a indovinare</text>
  </g>
</svg>
