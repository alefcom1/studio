<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="Форма или чат: где клиенту проще написать">
  <defs>
    <pattern id="gridWaVs" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="600" fill="#F7F6F2"/>
  <rect width="1200" height="600" fill="url(#gridWaVs)"/>
  <line x1="80" y1="86" x2="1120" y2="86" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="72" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">ФОРМА ИЛИ ЧАТ — ГДЕ КЛИЕНТУ ПРОЩЕ НАПИСАТЬ</text>
  <g transform="translate(80,120)">
    <rect width="490" height="340" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="28" y="56" class="disp" font-size="26" fill="#14161A">ФОРМА</text>
    <line x1="28" y1="76" x2="462" y2="76" stroke="#DDDBD4" stroke-width="1"/>
    <text x="28" y="128" class="body" font-size="20" fill="#5A5E66">ждёт ответа днями</text>
    <text x="28" y="184" class="body" font-size="20" fill="#5A5E66">просит много полей</text>
    <text x="28" y="240" class="body" font-size="20" fill="#5A5E66">звучит формально</text>
    <text x="28" y="296" class="body" font-size="20" fill="#5A5E66">легко закрыть вкладку</text>
  </g>
  <g transform="translate(630,120)">
    <rect width="490" height="340" fill="#FFFFFF" stroke="#2440C8" stroke-width="2"/>
    <text x="28" y="56" class="disp" font-size="26" fill="#2440C8">WHATSAPP</text>
    <line x1="28" y1="76" x2="462" y2="76" stroke="#C9D2FF" stroke-width="1"/>
    <text x="28" y="128" class="body" font-size="20" fill="#14161A">отвечаете сразу</text>
    <text x="28" y="184" class="body" font-size="20" fill="#14161A">хватает пары слов</text>
    <text x="28" y="240" class="body" font-size="20" fill="#14161A">живой разговор</text>
    <text x="28" y="296" class="body" font-size="20" fill="#14161A">переписка сохраняется</text>
  </g>
  <text x="80" y="510" class="mono" font-size="15" fill="#5A5E66">Форма — для тех, кто готов ждать. Чат — для тех, кто хочет ответ сейчас.</text>
  <text x="80" y="540" class="mono" font-size="15" fill="#5A5E66">Источник: WhatsApp Business · Eurostat · Регламент ЕС 2016/679.</text>
</svg>
