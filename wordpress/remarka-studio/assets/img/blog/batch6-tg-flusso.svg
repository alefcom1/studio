<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Percorso del cliente in una Telegram Mini App">
  <defs>
    <pattern id="gridTgF" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#EBEAE4" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:'Fragment Mono',ui-monospace,'DejaVu Sans Mono',monospace;}
      .disp{font-family:'Clash Display','Arial Narrow',Arial,sans-serif;font-weight:600;}
      .body{font-family:'General Sans',system-ui,'DejaVu Sans',Arial,sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="520" fill="#F7F6F2"/>
  <rect width="1200" height="520" fill="url(#gridTgF)"/>
  <line x1="80" y1="86" x2="1120" y2="86" stroke="#14161A" stroke-width="1.5"/>
  <text x="80" y="72" class="mono" font-size="15" letter-spacing="3" fill="#5A5E66">ПУТЬ КЛИЕНТА — ВСЁ ВНУТРИ ОДНОГО ЧАТА</text>
  <g transform="translate(80,150)">
    <rect x="0" y="0" width="230" height="150" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="22" y="50" class="disp" font-size="30" fill="#2440C8">1</text>
    <text x="22" y="92" class="body" font-size="22" font-weight="600" fill="#14161A">Открыл чат</text>
    <text x="22" y="124" class="body" font-size="16" fill="#5A5E66">уже в Telegram</text>
  </g>
  <g transform="translate(370,150)">
    <rect x="0" y="0" width="230" height="150" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="22" y="50" class="disp" font-size="30" fill="#2440C8">2</text>
    <text x="22" y="92" class="body" font-size="22" font-weight="600" fill="#14161A">Выбрал</text>
    <text x="22" y="124" class="body" font-size="16" fill="#5A5E66">каталог, корзина</text>
  </g>
  <g transform="translate(660,150)">
    <rect x="0" y="0" width="230" height="150" fill="#FFFFFF" stroke="#14161A" stroke-width="1.5"/>
    <text x="22" y="50" class="disp" font-size="30" fill="#2440C8">3</text>
    <text x="22" y="92" class="body" font-size="22" font-weight="600" fill="#14161A">Оплатил</text>
    <text x="22" y="124" class="body" font-size="16" fill="#5A5E66">не выходя из чата</text>
  </g>
  <g transform="translate(950,150)">
    <rect x="0" y="0" width="170" height="150" fill="#2440C8"/>
    <text x="22" y="50" class="disp" font-size="30" fill="#FFFFFF">4</text>
    <text x="22" y="92" class="body" font-size="22" font-weight="600" fill="#FFFFFF">Готово</text>
    <text x="22" y="124" class="body" font-size="16" fill="#C9D2FF">подтверждение</text>
  </g>
  <line x1="310" y1="225" x2="368" y2="225" stroke="#5A5E66" stroke-width="2"/>
  <line x1="600" y1="225" x2="658" y2="225" stroke="#5A5E66" stroke-width="2"/>
  <line x1="890" y1="225" x2="948" y2="225" stroke="#5A5E66" stroke-width="2"/>
  <text x="80" y="400" class="mono" font-size="15" fill="#5A5E66">Ни установки, ни отдельной регистрации, ни перехода на сторонний сайт.</text>
  <text x="80" y="430" class="mono" font-size="15" fill="#5A5E66">Источник: Telegram — документация Mini Apps и Payments API.</text>
</svg>
