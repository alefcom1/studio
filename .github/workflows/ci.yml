name: CI

# Лёгкие проверки боевой WordPress-темы и генератора. Astro-прототип
# (prototypes/**) намеренно НЕ проверяется — это мёртвый референс.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP setup
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP-синтаксис (тема)
        run: |
          # php -l по всем PHP боевой темы; первая ошибка валит сборку.
          find wordpress/remarka-studio -name '*.php' -print0 \
            | xargs -0 -I{} php -l "{}" >/dev/null

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Компиляция генератора
        run: python -m py_compile wordpress/build-tools/*.py

      - name: Round-trip генератора (нет ручных правок в patterns)
        run: |
          python wordpress/build-tools/ci_roundtrip.py
          # Если перегенерация изменила закоммиченные паттерны — значит их
          # правили руками мимо генератора. Показать дифф и упасть.
          git diff --stat -- wordpress/remarka-studio/patterns
          git diff --exit-code -- wordpress/remarka-studio/patterns

      - name: Скан placeholder-ов (боевая тема)
        run: |
          # Запрещённые в проде строки: фейковые реквизиты, заглушки-номера,
          # старая ширина контейнера (должна быть 1440, не 1240). Совпадение = красная сборка.
          if grep -rniE \
            '12345678901|wa\.me/390000000000|\+?390{6,}|Via Andrea Solari|Lorem ipsum|"contentSize":"1240px"' \
            wordpress/remarka-studio/patterns \
            wordpress/remarka-studio/functions.php \
            wordpress/build-tools/data.py; then
            echo '::error::Найдены placeholder/запрещённые строки (см. выше)'
            exit 1
          fi
          echo 'placeholder-скан: чисто'
