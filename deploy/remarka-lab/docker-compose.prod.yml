# ─────────────────────────────────────────────────────────────────────────────
# Remarka Lab · Monitor — PRODUCTION override (path A: internal tool behind
# Caddy Basic Auth on lab.remarka.biz).
#
# This file is an OVERRIDE. Always run it together with the platform's base
# compose file, from inside the code checkout (~/remarka-lab/sitelens):
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# What it changes vs. the base docker-compose.yml:
#   • api/web host ports are UNPUBLISHED (only Caddy reaches them, over the
#     internal Docker network). db/redis were never published — keep it that way
#     (do NOT add docker-compose.expose.yml in production).
#   • All secrets come from .env (POSTGRES_PASSWORD / DATABASE_URL / ...); the
#     hardcoded `sitelens_secret` from the base file is overridden here.
#   • CORS is pinned to the real origin.
#   • web image is (re)built with NEXT_PUBLIC_API_URL baked in (same origin), so
#     the browser calls https://lab.remarka.biz/api and /ws — no cross-origin.
#   • memory limits sized for a 4 GB box (see numbers + rationale below).
#   • a caddy service terminates TLS and enforces Basic Auth for the whole site.
#
# NOTE on `deploy.resources.limits`: with plain `docker compose up` (not Swarm),
# Compose v2/v5 DOES honor deploy.resources.limits as container memory caps.
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    environment:
      POSTGRES_DB: sitelens
      POSTGRES_USER: sitelens
      # Override the hardcoded base password with the value from .env.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    # No `ports:` — DB stays on the internal network only.
    deploy:
      resources:
        limits:
          # 512M: Postgres 16 with the default small shared_buffers is comfortable
          # for this dataset (crawl pages/issues for a handful of projects). Room
          # for autovacuum + a few connections from api/worker.
          memory: 512M

  redis:
    deploy:
      resources:
        limits:
          # 256M: Redis here is only BullMQ queues + crawl pub/sub, not a data
          # store. Small working set; 256M leaves headroom before it would evict.
          memory: 256M

  api:
    restart: unless-stopped
    environment:
      # Pull DB/Redis/CORS from .env instead of the base file's hardcoded values.
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://lab.remarka.biz}
      PORT: 3001
      NODE_ENV: production
      # Dominio del progetto mostrato dalla vetrina pubblica /api/public/showcase.
      # Deve esistere un Project con questo domain e almeno un crawl COMPLETED,
      # altrimenti l'endpoint risponde { data: null } e la pagina mostra il
      # placeholder «prima scansione in preparazione».
      SHOWCASE_DOMAIN: ${SHOWCASE_DOMAIN:-remarka.biz}
      # TTL sessione: l'API rinnova cab_session con questa durata (parità col
      # cabinet, che usa la stessa var). Default 7 giorni.
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-7}
    env_file: .env
    # Remove the base file's `ports: ['3001:3001']` publication entirely.
    # Compose CONCATENATES `ports` on merge, so a normal override would leave the
    # public 0.0.0.0:3001 in place (and Docker's own iptables rules bypass ufw,
    # so that would really be reachable). `!reset []` is the Compose-native way to
    # drop an inherited attribute. Caddy still reaches the API as `api:3001` over
    # the internal Docker network — nothing is published to the host.
    ports: !reset []
    deploy:
      resources:
        limits:
          # 512M: Fastify + Prisma client. Mostly I/O-bound request handling and
          # WebSocket fan-out; 512M is generous for this workload.
          memory: 512M

  worker:
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NODE_ENV: production
    env_file: .env
    deploy:
      resources:
        limits:
          # 1G: the heavy one. Bundles Chromium for optional JS-rendering
          # (renderJs) and runs up to 2 concurrent crawl jobs (BullMQ
          # concurrency=2, hardcoded in crawl-worker.ts). Chromium + parsing can
          # spike; 1G is the cap that keeps it from OOM-killing db/api. If you see
          # the worker get OOM-killed, lower crawl concurrency to 1 (see setup.md
          # → "Диагностика / OOM").
          memory: 1024M

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # CRITICAL: NEXT_PUBLIC_* is inlined at BUILD time. This bakes the public
        # origin into the JS bundle so the browser calls the same origin
        # (https://lab.remarka.biz/api, wss://lab.remarka.biz/ws). Requires the
        # one-line ARG/ENV patch to apps/web/Dockerfile — see setup.md step 4.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://lab.remarka.biz}
        # Baked at BUILD (NEXT_PUBLIC_*): where Monitor sends users to sign in /
        # out under the unified account (M2). The (protected) guard redirects an
        # unauthenticated visitor here, and the logout button lands on its
        # /logout. Keep equal to CABINET_URL.
        NEXT_PUBLIC_CABINET_URL: ${CABINET_URL:-https://cab.remarka.biz}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Overrides the base file's leftover runtime `http://localhost:3001`. Note:
      # for NEXT_PUBLIC_* this runtime value is a no-op (the real value is baked
      # in at build via build.args above) — set here only to avoid a misleading
      # localhost showing up on `docker inspect`.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://lab.remarka.biz}
      NEXT_PUBLIC_CABINET_URL: ${CABINET_URL:-https://cab.remarka.biz}
    # Same as api: drop the inherited `ports: ['3000:3000']` publication.
    # Caddy reaches web as `web:3000` over the internal Docker network.
    ports: !reset []
    deploy:
      resources:
        limits:
          # 512M: Next.js standalone runtime is light (mostly SSR proxying to the
          # API). 512M is comfortable headroom.
          memory: 512M

  # ─── Cabinet (client portal, K1 + K2) ───────────────────────────────────────
  # NOT an override of a base-compose service — `cabinet` does not exist in
  # docker-compose.yml at all, this is the full and only definition. Separate
  # app (apps/cabinet), its own Next.js standalone runtime + Route Handlers,
  # same Postgres (tables cab_*), no Redis/worker dependency. Publicly
  # reachable at cab.remarka.biz WITHOUT basic_auth (see Caddyfile) — the app
  # does its own auth (magic-link + server-side sessions). See setup.md →
  # "Cabinet" for the full deploy runbook.
  #
  # K2 addition (piano-cabinet-k2.md §7): client/staff file uploads (macket-
  # up images, deliverables, invoice PDFs — §3) live on a bind-mount, NOT in
  # the DB and NOT in a Docker named volume — a bind-mount lets backup.sh tar
  # the directory straight off the host filesystem with no docker-exec
  # gymnastics. Plain host directory `./cabinet-files` next to this compose
  # file (create it once — see setup.md "Cabinet" section).
  cabinet:
    build:
      context: .
      dockerfile: apps/cabinet/Dockerfile
      args:
        # Baked in at BUILD time (same NEXT_PUBLIC_* caveat as web above) —
        # used for absolute links (e.g. in emails). Keep equal to CABINET_URL.
        NEXT_PUBLIC_CABINET_URL: ${CABINET_URL:-https://cab.remarka.biz}
    restart: unless-stopped
    environment:
      # Явный PORT обязателен: standalone-сервер Next читает его на старте, а
      # Dockerfile кабинета оставляет дефолт 3001 — без этой строки контейнер
      # слушает 3001, Caddy проксирует на 3002 и отдаёт 502 (поймано на проде
      # 17.07.2026 при миграции).
      PORT: 3002
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      NODE_ENV: production
      CABINET_URL: ${CABINET_URL:-https://cab.remarka.biz}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-7}
      MAGIC_TTL_MINUTES: ${MAGIC_TTL_MINUTES:-15}
      # Unica-utenza (M2): il cookie di sessione vale per cab + lab. DEVE essere
      # il dominio padre condiviso — senza questo un utente loggato nel cabinet
      # non è riconosciuto su lab.remarka.biz (redirect loop dopo aver tolto il
      # Basic Auth). set/clear usano la stessa domain (lib/session.ts).
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.remarka.biz}
      # Signup self-serve free: e-mail sconosciuta → nuovo CabUser via magic-link.
      # Metti CAB_OPEN_SIGNUP=0 per tornare a invito-solo (clienti seed dallo staff).
      CAB_OPEN_SIGNUP: ${CAB_OPEN_SIGNUP:-1}
      # Brevo transactional email (owner decision 16.07.2026, EU/GDPR). Empty
      # key = dev mode: the app logs the magic link to stdout instead of
      # sending — it does NOT fail startup or crash on a missing key, but a
      # real pilot rollout needs a real key here.
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@remarka.biz}
      # K2 §3.1: path INSIDE the container where uploaded files are read/
      # written — must match the bind-mount target on the right of the
      # `volumes:` line below. K2 §6: who gets `staff_action`-adjacent
      # notifications addressed to "the studio" (approval decided, ticket
      # created/replied-to-by-client) — falls back to the first isStaff=true
      # CabUser if left empty (see lib/notify.ts).
      CABINET_FILES_DIR: /data/cabinet-files
      STAFF_NOTIFY_EMAIL: ${STAFF_NOTIFY_EMAIL:-}
    env_file: .env
    # Bind-mount (not a named volume — see the K2 comment above): host
    # ./cabinet-files ⇄ container /data/cabinet-files. Create the host
    # directory once before first `up` (setup.md "Cabinet" → mkdir step);
    # Docker will otherwise create it root-owned on first start, which still
    # works (the cabinet container also runs as root per its Dockerfile) but
    # is worth doing explicitly so permissions are never a surprise.
    volumes:
      - ./cabinet-files:/data/cabinet-files
    # Not published to the host — Caddy reaches it as `cabinet:3002` over the
    # internal Docker network only (same pattern as api/web above).
    ports: !reset []
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # 384M unchanged from K1: uploaded files are streamed to/from disk
          # (lib/storage.ts), never buffered whole in memory beyond the
          # single request's body — the file layer does not raise this
          # app's memory footprint. See piano-cabinet-k1.md §7.3 for the
          # box's full memory budget (3328M summed limits on a 4 GB host).
          memory: 384M

  # ─── WordPress remarka.biz (миграция с РФ-хостинга, 16.07.2026) ────────────
  # Сайт-визитка переезжает на этот же сервер (docs/migrazione-wp-hetzner.md).
  # Не override: сервисов wpdb/wordpress/wpcli в базовом compose нет — это
  # полные определения. Данные — на bind-mount'ах рядом с compose-файлом
  # (./wp-html, ./wp-db), чтобы backup.sh брал их простым tar'ом.
  wpdb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: ${WP_DB_PASSWORD:?set WP_DB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD:?set WP_DB_ROOT_PASSWORD in .env}
    volumes:
      - ./wp-db:/var/lib/mysql
    # Не публикуется на хост — только внутренняя сеть (как db/redis).
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          # 512M: дефолтный innodb_buffer_pool 128M + соединения PHP; для
          # сайта-визитки с блогом этого достаточно с запасом.
          memory: 512M

  wordpress:
    # Движущийся тег «последний WP на PHP 8.3»: при пересоздании контейнера
    # может приехать новый минор WP — это ок, база обновляется автоматически
    # (или `wp core update-db` через wpcli).
    image: wordpress:php8.3-apache
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: wpdb
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD:?set WP_DB_PASSWORD in .env}
      # ВАЖНО: префикс таблиц должен совпадать со старым wp-config.php
      # (см. runbook, фаза 1: `grep table_prefix wp-config.php`).
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX:-wp_}
      # Caddy терминирует TLS и проксирует по http — говорим WP, что снаружи
      # https, иначе бесконечный редирект-цикл и mixed content.
      WORDPRESS_CONFIG_EXTRA: |
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
          $$_SERVER['HTTPS'] = 'on';
        }
    volumes:
      - ./wp-html:/var/www/html
      - ./wp-uploads.ini:/usr/local/etc/php/conf.d/zz-uploads.ini:ro
    ports: !reset []
    depends_on:
      wpdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # 512M: Apache+PHP-FPM образа wordpress; хватает на витрину с
          # инструментами Lab (обращения к Anthropic/PSI — исходящие HTTP,
          # памяти почти не едят).
          memory: 512M

  # wp-cli тем же образом-компаньоном: НЕ стартует с `up` (profiles), только
  # по требованию:  docker compose ... run --rm wpcli <команда>
  # Пример:         docker compose ... run --rm wpcli core version
  wpcli:
    image: wordpress:cli-php8.3
    profiles: ['tools']
    user: '33:33'
    environment:
      WORDPRESS_DB_HOST: wpdb
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD:?set WP_DB_PASSWORD in .env}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX:-wp_}
    volumes:
      - ./wp-html:/var/www/html
    depends_on:
      wpdb:
        condition: service_healthy

  # ─── Reverse proxy / TLS / Basic Auth ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
      - cabinet
    deploy:
      resources:
        limits:
          # 128M: Caddy is a tiny Go binary; 128M is plenty for one or two sites.
          memory: 128M

volumes:
  # pgdata / redisdata are declared in the base compose; re-declaring caddy vols:
  caddy_data:
  caddy_config:
