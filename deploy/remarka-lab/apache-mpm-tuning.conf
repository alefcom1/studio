# ─────────────────────────────────────────────────────────────────────────────
# Ограничение пула Apache-воркеров — КРИТИЧНО на боксе БЕЗ рескейла (4 ГБ).
#
# Проблема: образ wordpress:php8.3-apache использует mpm_prefork + mod_php, и
# по умолчанию MaxRequestWorkers = 150. Каждый воркер держит PHP+WordPress в
# памяти (~50–70 МБ). 150 воркеров = потенциально 7–10 ГБ — контейнер с лимитом
# 768M при всплеске трафика упрётся в лимит и словит OOM (упадут ОБА сайта,
# т.к. Apache общий). Docker-лимит сам по себе от этого НЕ спасает — он лишь
# граница, за которой контейнер убивают.
#
# Решение: жёстко ограничить число воркеров так, чтобы пиковая память Apache
# не превышала docker-лимит. 10 воркеров × ~60 МБ + база/OPcache ~150 МБ
# ≈ 750 МБ < 768M. Для двух сайтов-визиток с низким трафиком 10 одновременных
# воркеров — с запасом (при росте трафика поднять вместе с docker-лимитом).
#
# ⚠️ Настройка ГЛОБАЛЬНАЯ для этого Apache — управляет и remarka.biz, и
# traduzione.tech (контейнер общий). Для remarka.biz это тоже улучшение
# безопасности (сейчас он крутится с дефолтными 150 воркерами на лимите 512M —
# т.е. уже под риском OOM при всплеске, просто трафик низкий). Согласовать с
# владельцем перед применением.
#
# Монтируется как замена дефолтного mpm_prefork.conf (см.
# docker-compose.traduzione.yml).
# ─────────────────────────────────────────────────────────────────────────────

<IfModule mpm_prefork_module>
	StartServers            2
	MinSpareServers         2
	MaxSpareServers         4
	MaxRequestWorkers       10
	ServerLimit             10
	MaxConnectionsPerChild  1000
</IfModule>
