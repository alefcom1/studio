# ─────────────────────────────────────────────────────────────────────────────
# Apache vhost для traduzione.tech — ВТОРОЙ сайт в общем контейнере `wordpress`.
#
# Куда монтировать (docker-compose.traduzione.yml делает это):
#   ./apache-traduzione.conf → /etc/apache2/sites-enabled/020-traduzione.conf:ro
#
# Как это работает вместе с remarka.biz:
#   • Образ wordpress:php8.3-apache уже несёт /etc/apache2/sites-enabled/
#     000-default.conf с DocumentRoot /var/www/html (это remarka.biz).
#   • 000-default грузится ПЕРВЫМ (000 < 020) → остаётся vhost'ом по умолчанию:
#     любой Host, не совпавший явно, попадает на remarka.biz — прежнее
#     поведение сайта не меняется вообще.
#   • Этот файл добавляет ТОЛЬКО именованный vhost для traduzione.tech /
#     www.traduzione.tech → /var/www/traduzione. Ничего в setup remarka.biz
#     не трогаем.
#
# TLS терминирует Caddy снаружи и ходит сюда по http на :80 — поэтому здесь
# слушаем обычный :80 (HTTPS-детект чинится в wp-config через
# HTTP_X_FORWARDED_PROTO, как у remarka.biz).
# ─────────────────────────────────────────────────────────────────────────────

<VirtualHost *:80>
	ServerName traduzione.tech
	ServerAlias www.traduzione.tech
	DocumentRoot /var/www/traduzione

	<Directory /var/www/traduzione>
		Options FollowSymLinks
		# AllowOverride All — чтобы работал .htaccess WordPress (pretty
		# permalinks). URL-непрерывность (docs/url-continuity.md) зависит
		# от этого.
		AllowOverride All
		Require all granted
	</Directory>

	# Логи в stdout/stderr контейнера (docker compose ... logs wordpress).
	ErrorLog /proc/self/fd/2
	CustomLog /proc/self/fd/1 combined
</VirtualHost>
